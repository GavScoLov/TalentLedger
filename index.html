<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Login</title>
    <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
    <link rel="shortcut icon" href="./assets/TalentLedger-Icon.png">
    <link rel="stylesheet" href="./src/design-system.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">TL</div>
                <h1 class="login-title">TalentLedger</h1>
                <p class="login-subtitle">Sign in to your account</p>
            </div>
            <div id="login-error" class="login-error" style="display:none;"></div>
            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input class="form-input" type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary login-btn">Sign In</button>
            </form>
            <div class="login-divider"><span>OR</span></div>
            <button class="login-google" id="google-login-btn">
                <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                    <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                </svg>
                Continue with Google
            </button>
        </div>
    </div>

    <script type="module">
        import { login, loginWithGoogle, onAuthStateChange } from './src/auth.js';
        import { supabase } from './src/supabaseClient.js';

        // Redirect if already logged in
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            window.location.href = './commission.html';
        }

        // Auto-redirect on auth state change (e.g. after Google OAuth callback)
        onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                window.location.href = './commission.html';
            }
        });

        // Login form handler
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');

            try {
                await login(email, password);
                window.location.href = './commission.html';
            } catch (err) {
                errorEl.textContent = err.message || 'Invalid email or password.';
                errorEl.style.display = 'block';
            }
        });

        // Google OAuth login
        document.getElementById('google-login-btn').addEventListener('click', async (e) => {
            e.preventDefault();
            try {
                await loginWithGoogle();
            } catch (err) {
                const errorEl = document.getElementById('login-error');
                errorEl.textContent = err.message || 'Google login failed.';
                errorEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
