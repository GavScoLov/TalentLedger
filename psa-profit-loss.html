<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - PSA Profit & Loss</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-trendline@1.0.0/dist/chartjs-plugin-trendline.min.js"></script>
    <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
    <link rel="shortcut icon" href="./assets/TalentLedger-Icon.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .report-layout {
            display: grid; grid-template-columns: 35% 1fr; grid-template-rows: auto 1fr; gap: 16px;
        }
        .report-tabs { grid-row: 1; grid-column: 1 / 3; }
        .report-table-section { grid-row: 2; grid-column: 1; display: flex; flex-direction: column; gap: 16px; }
        .report-chart-section { grid-row: 2; grid-column: 2; display: flex; flex-direction: column; }
        .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px; }
        .table-scroll { overflow-y: auto; max-height: calc(100vh - 400px); }
        .total-bar {
            background-color: var(--primary); color: #fff; padding: 8px 12px;
            border-radius: 0 0 8px 8px; text-align: center; font-weight: 700; font-size: 15px;
        }
        .chart-wrap { position: relative; flex: 1; min-height: 300px; padding: 12px; }

        /* Radio filter group */
        .radio-filter-group {
            display: flex; gap: 2px; align-items: center;
        }
        .radio-filter-group input[type="radio"] {
            position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;
        }
        .radio-filter-group label {
            display: flex; align-items: center; justify-content: center;
            padding: 6px 16px; border-radius: 6px; background-color: var(--bg-default);
            color: var(--text-primary); font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background-color 0.2s, color 0.2s;
            border: 1px solid var(--border-color);
        }
        .radio-filter-group label:hover { background-color: var(--border-color); }
        .radio-filter-group input[type="radio"]:checked + label {
            background-color: var(--primary); color: #fff; border-color: var(--primary);
        }
        .radio-filter-group input[type="radio"]:checked + label:hover {
            background-color: var(--primary-dark);
        }

        /* Graph filter bar */
        .graph-filter-bar {
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .graph-filter-bar select { max-width: 140px; }
        .graph-filter-title {
            flex: 1; text-align: center; font-size: 16px; font-weight: 700;
            color: var(--text-primary);
        }
        .graph-total-bar {
            display: flex; justify-content: center; padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .total-revenue-display {
            background-color: rgba(124, 58, 237, 0.1); color: var(--primary);
            padding: 8px 32px; border-radius: 6px; font-size: 18px; font-weight: 700;
        }
        .graph-display {
            flex: 1; display: flex; justify-content: center; align-items: center;
            padding: 12px; min-height: 300px;
        }
        .graph-display canvas { max-width: 100%; max-height: 500px; }
        .no-data-message { text-align: center; color: var(--text-secondary); font-size: 1.1em; }

        /* Print button */
        .btn-icon {
            background: none; border: 1px solid var(--border-color); border-radius: 6px;
            padding: 6px 10px; cursor: pointer; display: flex; align-items: center;
            transition: background-color 0.2s;
        }
        .btn-icon:hover { background-color: var(--bg-default); }
        .btn-icon img { height: 20px; width: 20px; }

        /* Overhead tabs */
        .overhead-card { overflow: hidden; }
        .tab-buttons { display: flex; border-bottom: 1px solid var(--border-color); }
        .tab-button {
            background-color: var(--bg-default); border: none; outline: none;
            cursor: pointer; padding: 10px 16px; transition: 0.2s;
            font-size: 14px; font-weight: 600; color: var(--text-secondary);
            border-radius: 0;
        }
        .tab-button:hover { background-color: var(--border-color); }
        .tab-button.active {
            background-color: var(--primary); color: #fff;
        }
        .tab-content { display: none; padding: 12px; }
        .tab-content.active { display: block; }

        /* Overhead form */
        .overhead-form-header {
            color: var(--text-primary); font-size: 18px; font-weight: 700;
            padding: 8px 0; text-align: center;
        }
        .overhead-form { display: flex; flex-direction: column; gap: 10px; color: var(--text-primary); }
        .overhead-form .form-group { display: flex; flex-direction: column; gap: 4px; }
        .overhead-form .form-group label { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .overhead-form input[type="text"],
        .overhead-form input[type="date"],
        .overhead-form input[type="number"],
        .overhead-form select {
            padding: 8px 12px; border: 1px solid var(--border-color); background-color: var(--bg-default);
            border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box;
            font-family: 'Inter', sans-serif; transition: border-color 0.2s;
        }
        .overhead-form input:focus, .overhead-form select:focus {
            outline: none; border-color: var(--primary);
        }
        .overhead-form .submit-button {
            background-color: var(--primary); color: #fff; padding: 10px 16px;
            border: none; border-radius: 8px; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: background-color 0.2s;
        }
        .overhead-form .submit-button:hover { background-color: var(--primary-dark); }
        .overhead-message { padding: 10px; border-radius: 4px; font-weight: 600; text-align: center; }
        .overhead-message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .overhead-message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

        /* Amount cell alignment */
        .amount-cell { text-align: right; font-weight: 600; }

        @media (max-width: 900px) {
            .report-layout { grid-template-columns: 1fr; }
            .report-chart-section { grid-column: 1; }
        }

        /* Print styles */
        @media print {
            body { background-color: #fff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; margin: 0; padding: 0; }
            .sidebar, .topbar, .report-tabs, .filter-bar, .graph-filter-bar, .tab-buttons, .overhead-form { display: none !important; }
            .main-content { margin: 0 !important; padding: 0 !important; }
            .report-layout { display: block !important; }
            .report-table-section, .report-chart-section { width: 100% !important; }
            .card { box-shadow: none !important; border: none !important; }
            .data-table th, .data-table td { border: 1px solid #000 !important; color: #000 !important; }
            .data-table th { background-color: #ddd !important; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">PSA Profit & Loss</h1>
            </div>
            <div class="report-layout">
                <div class="report-tabs">
                    <div class="card" style="padding:8px;">
                        <div class="tab-nav" style="margin:0;border:0;">
                            <a href="./profit-loss.html" class="tab-nav-item">P&L</a>
                            <a href="./psa-profit-loss.html" class="tab-nav-item active">PSA P&L</a>
                            <div style="flex:1;display:flex;gap:6px;justify-content:flex-end;align-items:center;">
                                <input class="form-input" type="date" id="start_date_internal" style="max-width:150px;">
                                <input class="form-input" type="date" id="end_date_internal" style="max-width:150px;">
                                <input class="form-input" type="text" id="company_search_internal" placeholder="Search company..." style="max-width:180px;">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="report-table-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="filter-bar">
                            <select class="form-select" id="table_filter_branch_select">
                                <option value="all">All Branches</option>
                            </select>
                            <div class="radio-filter-group">
                                <input type="radio" id="plg_radio_filter_all" name="plg_radio_filter" value="All" checked>
                                <label for="plg_radio_filter_all">All</label>
                                <input type="radio" id="plg_radio_filter_dhp" name="plg_radio_filter" value="DHP">
                                <label for="plg_radio_filter_dhp">DHP</label>
                                <input type="radio" id="plg_radio_filter_gsp" name="plg_radio_filter" value="GSP">
                                <label for="plg_radio_filter_gsp">GSP</label>
                            </div>
                            <button class="btn btn-primary" type="button" id="table_filter_search_button" style="padding:6px 16px;">Apply</button>
                        </div>
                        <div class="table-scroll">
                            <table class="data-table" id="branch_table">
                                <thead>
                                    <tr>
                                        <th>Branch</th>
                                        <th class="amount-cell">DHP Profit</th>
                                        <th class="amount-cell">GSP Profit</th>
                                        <th class="amount-cell">Overhead</th>
                                        <th class="amount-cell">Overall Profit</th>
                                    </tr>
                                </thead>
                                <tbody id="branch_table_body"></tbody>
                            </table>
                        </div>
                        <div class="total-bar" id="total-revenue">Total Revenue: $0.00</div>
                    </div>
                    <div class="card overhead-card" style="padding:0;overflow:hidden;">
                        <div class="tab-buttons">
                            <button class="tab-button" onclick="openTab(event, 'CurrentOverhead')">Current Overhead</button>
                            <button class="tab-button" onclick="openTab(event, 'AddOverhead')">Add Overhead</button>
                        </div>
                        <div id="CurrentOverhead" class="tab-content">
                            <div class="table-scroll" style="max-height:200px;">
                                <table class="data-table" id="overhead_table">
                                    <thead>
                                        <tr>
                                            <th>Branch</th>
                                            <th>Week Ending</th>
                                            <th class="amount-cell">Rent</th>
                                            <th class="amount-cell">Producer</th>
                                            <th class="amount-cell">SS/SM</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                            <p id="no_overhead_data_message" class="no-data-message" style="display:none;">No overhead data available.</p>
                        </div>
                        <div id="AddOverhead" class="tab-content">
                            <div class="overhead-form-header">Add Overhead Entry</div>
                            <div id="overhead_message"></div>
                            <form class="overhead-form" id="overhead_form">
                                <div class="form-group">
                                    <label for="overhead_branch">Branch:</label>
                                    <select id="overhead_branch" name="overhead_branch" required>
                                        <option value="">Select Branch</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="overhead_week_ending">Week Ending:</label>
                                    <input type="date" id="overhead_week_ending" name="overhead_week_ending" required>
                                </div>
                                <div class="form-group">
                                    <label for="overhead_rent">Rent ($):</label>
                                    <input type="number" id="overhead_rent" name="overhead_rent" step="0.01" placeholder="0.00" required>
                                </div>
                                <div class="form-group">
                                    <label for="overhead_producer">Producer ($):</label>
                                    <input type="number" id="overhead_producer" name="overhead_producer" step="0.01" placeholder="0.00" required>
                                </div>
                                <div class="form-group">
                                    <label for="overhead_ss_sm">SS/SM ($):</label>
                                    <input type="number" id="overhead_ss_sm" name="overhead_ss_sm" step="0.01" placeholder="0.00" required>
                                </div>
                                <button type="submit" class="submit-button">Submit Overhead</button>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="report-chart-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="graph-filter-bar">
                            <select class="form-select" id="graph_filter_interval_select" style="max-width:120px;">
                                <option value="weekly" selected>Weekly</option>
                                <option value="monthly">Monthly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                            <div class="graph-filter-title">PLG - Profit & Loss Graph (Sequenced)</div>
                            <select class="form-select" id="graph_filter_type_select" style="max-width:100px;">
                                <option value="bar" selected>Bar</option>
                                <option value="line">Line</option>
                                <option value="pie">Pie</option>
                            </select>
                            <select class="form-select" id="graph_filter_plg_sub_select" style="max-width:140px;">
                                <option value="Sequenced" selected>Sequenced</option>
                                <option value="Cumulative">Cumulative</option>
                                <option value="Worst 4">Worst 4</option>
                                <option value="Best 4">Best 4</option>
                            </select>
                            <button class="btn-icon" id="print_page_button" title="Print">
                                <img src="https://cdn-icons-png.flaticon.com/512/93/93649.png" alt="Print">
                            </button>
                        </div>
                        <div class="graph-total-bar">
                            <div class="total-revenue-display" id="graph-total-display">Total: 0.00</div>
                        </div>
                        <div class="graph-display">
                            <!-- Chart will be rendered here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, checkPageAccess } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';
        import { fetchInvoiceRegister, fetchTotalBillingByBranch, formatCurrency, formatCurrency2, getDefaultStartDate, getDefaultEndDate } from './src/apiClient.js';

        await checkAuth();
        await checkPageAccess('profit-loss');
        renderNavbar();
        await renderSidebar();
        initInactivityTimer();

        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#6B7280';

        // ── State ─────────────────────────────────────────────────
        let rawInvoiceData = [];
        let rawBillingData = [];
        let branchPLData = [];       // aggregated P&L rows for branch table
        let timeSeriesData = [];     // time-bucketed profit data for chart
        let uniqueBranches = [];
        let myChart = null;

        const pieColors = ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#C9CBCF', '#E7E9ED', '#7BC8A4', '#FF6B6B', '#4ECDC4', '#45B7D1'];
        const best4Colors = ['rgba(75,192,192,0.7)', 'rgba(54,162,235,0.7)', 'rgba(153,102,255,0.7)', 'rgba(124,58,237,0.7)'];
        const worst4Colors = ['rgba(255,99,132,0.7)', 'rgba(255,159,64,0.7)', 'rgba(255,205,86,0.7)', 'rgba(201,203,207,0.7)'];

        // Branch groups for client-side filtering
        const branchGroups = {
            'MO-STL': ['Mehlville', 'St.', 'Bridgeton', 'Fairview'],
            'GA-ATL': ['Adairsville', 'Austell', 'Cartersville', 'Rome', 'Kennesaw'],
            'Austell & Kennesaw': ['Austell', 'Kennesaw'],
        };

        // ── Init dates ────────────────────────────────────────────
        document.getElementById('start_date_internal').value = getDefaultStartDate();
        document.getElementById('end_date_internal').value = getDefaultEndDate();

        // ── Fetch Data ────────────────────────────────────────────
        async function loadData() {
            const startDate = document.getElementById('start_date_internal').value;
            const endDate = document.getElementById('end_date_internal').value;
            if (!startDate || !endDate) return;

            document.getElementById('branch_table_body').innerHTML = '<tr><td colspan="5" class="loading-indicator">Loading data...</td></tr>';

            try {
                const [invoiceData, billingData] = await Promise.all([
                    fetchInvoiceRegister(startDate, endDate),
                    fetchTotalBillingByBranch(startDate, endDate),
                ]);

                rawInvoiceData = invoiceData;
                rawBillingData = billingData;

                // Collect unique branches
                const branchSet = new Set();
                rawInvoiceData.forEach(r => { if (r.branchname) branchSet.add(r.branchname); });
                rawBillingData.forEach(r => { if (r.branch) branchSet.add(r.branch); });
                uniqueBranches = [...branchSet].sort();
                populateBranchDropdowns();

                processData();
            } catch (err) {
                document.getElementById('branch_table_body').innerHTML = `<tr><td colspan="5" class="loading-indicator" style="color:#DC2626">Error: ${err.message}</td></tr>`;
            }
        }

        // ── Populate branch dropdowns from API data ───────────────
        function populateBranchDropdowns() {
            // Table filter dropdown
            const sel = document.getElementById('table_filter_branch_select');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">All Branches</option>';
            // Add group options
            Object.keys(branchGroups).forEach(g => {
                const opt = document.createElement('option');
                opt.value = g; opt.textContent = g;
                if (g === cur) opt.selected = true;
                sel.appendChild(opt);
            });
            // Add individual branches
            uniqueBranches.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                if (b === cur) opt.selected = true;
                sel.appendChild(opt);
            });

            // Overhead branch dropdown
            const ohSel = document.getElementById('overhead_branch');
            ohSel.innerHTML = '<option value="">Select Branch</option>';
            uniqueBranches.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                ohSel.appendChild(opt);
            });
        }

        // ── Process & aggregate data ──────────────────────────────
        function processData() {
            const branchFilter = document.getElementById('table_filter_branch_select').value;
            const radioGroup = document.querySelector('input[name="plg_radio_filter"]:checked');
            const plgFilter = radioGroup ? radioGroup.value : 'All';
            const search = (document.getElementById('company_search_internal').value || '').toLowerCase();

            // Build gross pay map from billing data { branch: totalGrossPay }
            const grossPayMap = {};
            rawBillingData.forEach(r => {
                const b = r.branch || 'Unknown';
                grossPayMap[b] = (grossPayMap[b] || 0) + (Number(r.total_billing) || 0);
            });

            // Aggregate invoice data by branch, splitting DHP/GSP revenue
            const branchAgg = {};
            const timeAgg = {};  // keyed by weekendbill date

            rawInvoiceData.forEach(r => {
                const branch = r.branchname || 'Unknown';
                const isDHP = (r.customername || '').toUpperCase().includes('DHP');
                const amount = Number(r.invoiceamount) || 0;
                const weekend = r.weekendbill || '';

                // Apply branch filter
                if (branchFilter !== 'all') {
                    if (branchGroups[branchFilter]) {
                        if (!branchGroups[branchFilter].some(g => branch.includes(g))) return;
                    } else if (branch !== branchFilter) return;
                }

                // Apply DHP/GSP filter
                if (plgFilter === 'DHP' && !isDHP) return;
                if (plgFilter === 'GSP' && isDHP) return;

                // Apply company search
                if (search && !(r.customername || '').toLowerCase().includes(search)) return;

                // Branch aggregation
                if (!branchAgg[branch]) branchAgg[branch] = { branch, dhpRevenue: 0, gspRevenue: 0 };
                if (isDHP) branchAgg[branch].dhpRevenue += amount;
                else branchAgg[branch].gspRevenue += amount;

                // Time-series aggregation by weekend
                if (weekend) {
                    if (!timeAgg[weekend]) timeAgg[weekend] = { date: weekend, revenue: 0 };
                    timeAgg[weekend].revenue += amount;
                }
            });

            // Build branch P&L table data: revenue - grossPay = profit
            branchPLData = Object.values(branchAgg).map(b => {
                const grossPay = grossPayMap[b.branch] || 0;
                const dhpProfit = b.dhpRevenue;
                const gspProfit = b.gspRevenue;
                const totalRevenue = dhpProfit + gspProfit;
                const overhead = grossPay;
                const overallProfit = totalRevenue - overhead;
                return { branch: b.branch, dhpProfit, gspProfit, overhead, overallProfit };
            }).sort((a, b) => b.overallProfit - a.overallProfit);

            // Build time-series for chart
            timeSeriesData = Object.values(timeAgg).sort((a, b) => a.date.localeCompare(b.date));

            renderBranchTable();
            renderGraph();
        }

        // ── Render branch table ───────────────────────────────────
        function renderBranchTable() {
            const tbody = document.getElementById('branch_table_body');
            tbody.innerHTML = '';
            let total = 0;

            if (!branchPLData.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading-indicator">No data for selected filters.</td></tr>';
            } else {
                branchPLData.forEach(row => {
                    total += row.overallProfit;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.branch}</td>
                        <td class="amount-cell">${formatCurrency2(row.dhpProfit)}</td>
                        <td class="amount-cell">${formatCurrency2(row.gspProfit)}</td>
                        <td class="amount-cell">${formatCurrency2(row.overhead)}</td>
                        <td class="amount-cell" style="color:${row.overallProfit >= 0 ? '#10B981' : '#DC2626'}">${formatCurrency2(row.overallProfit)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            document.getElementById('total-revenue').textContent = `Total Profit: ${formatCurrency2(total)}`;
            document.getElementById('graph-total-display').textContent = `Total: ${formatCurrency2(total)}`;
        }

        // ── Render graph ──────────────────────────────────────────
        function renderGraph() {
            const graphDisplayDiv = document.querySelector('.graph-display');
            if (myChart) { myChart.destroy(); myChart = null; }
            graphDisplayDiv.innerHTML = '';

            const interval = document.getElementById('graph_filter_interval_select').value;
            const graphType = document.getElementById('graph_filter_type_select').value;
            const plgSubGraph = document.getElementById('graph_filter_plg_sub_select').value;
            const branchFilter = document.getElementById('table_filter_branch_select').value;
            const search = document.getElementById('company_search_internal').value || '';

            // Update title
            const titleDiv = document.querySelector('.graph-filter-title');
            let branchText = branchFilter !== 'all' ? ` - ${branchFilter}` : '';
            let searchText = search ? ` - ${search}` : '';
            titleDiv.textContent = `PLG - Profit & Loss Graph (${plgSubGraph})${branchText}${searchText}`;

            const intervalSelect = document.getElementById('graph_filter_interval_select');

            // Handle Best 4 / Worst 4
            if (plgSubGraph === 'Best 4' || plgSubGraph === 'Worst 4') {
                intervalSelect.disabled = true;
                const sorted = [...branchPLData].sort((a, b) => a.overallProfit - b.overallProfit);
                const selected = plgSubGraph === 'Worst 4' ? sorted.slice(0, 4) : sorted.slice(-4).reverse();
                const colors = plgSubGraph === 'Worst 4' ? worst4Colors : best4Colors;

                if (!selected.length) {
                    graphDisplayDiv.innerHTML = '<p class="no-data-message">No data available.</p>';
                    return;
                }

                if (graphType === 'pie') {
                    const canvas = document.createElement('canvas');
                    graphDisplayDiv.appendChild(canvas);
                    myChart = new Chart(canvas.getContext('2d'), {
                        type: 'pie',
                        data: {
                            labels: selected.map(s => s.branch),
                            datasets: [{ data: selected.map(s => Math.abs(s.overallProfit)), backgroundColor: colors, hoverOffset: 10 }],
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' }, datalabels: { display: true, color: '#1F2937', font: { weight: 'bold', size: 14 }, formatter: v => formatCurrency(v) } } },
                    });
                } else {
                    const datasets = selected.map((s, i) => ({
                        label: s.branch, data: [s.overallProfit],
                        backgroundColor: colors[i], borderColor: colors[i].replace('0.7', '1'), borderWidth: 1,
                    }));
                    const canvas = document.createElement('canvas');
                    graphDisplayDiv.appendChild(canvas);
                    myChart = new Chart(canvas.getContext('2d'), {
                        type: graphType, data: { labels: ['Total Profit'], datasets },
                        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } } }, plugins: { datalabels: { display: true, color: '#1F2937', font: { weight: 'bold' }, formatter: v => formatCurrency(v), anchor: 'end', align: 'start' } } },
                    });
                }
                return;
            }

            intervalSelect.disabled = false;

            // Bucket time-series by interval
            const buckets = {};
            timeSeriesData.forEach(t => {
                let key;
                if (interval === 'weekly') key = t.date;
                else if (interval === 'monthly') key = t.date.substring(0, 7);
                else key = t.date.substring(0, 4);
                buckets[key] = (buckets[key] || 0) + t.revenue;
            });

            // Subtract gross pay proportionally for profit calculation
            const totalRevenue = timeSeriesData.reduce((s, t) => s + t.revenue, 0);
            const totalGrossPay = rawBillingData.reduce((s, r) => s + (Number(r.total_billing) || 0), 0);

            const labels = Object.keys(buckets).sort();
            const sequencedData = labels.map(k => {
                const rev = buckets[k];
                const proportion = totalRevenue > 0 ? rev / totalRevenue : 0;
                return rev - (totalGrossPay * proportion);
            });

            // Build cumulative
            const cumulativeData = [];
            let cumSum = 0;
            sequencedData.forEach(v => { cumSum += v; cumulativeData.push(cumSum); });

            if (!labels.length) {
                graphDisplayDiv.innerHTML = '<p class="no-data-message">No graph data available for the selected filters and interval.</p>';
                return;
            }

            const dataToUse = plgSubGraph === 'Cumulative' ? cumulativeData : sequencedData;
            const segColors = dataToUse.map(v => v >= 0 ? 'rgba(75,192,192,0.7)' : 'rgba(255,99,132,0.7)');
            const fontColors = dataToUse.map(() => '#1F2937');

            const canvas = document.createElement('canvas');
            graphDisplayDiv.appendChild(canvas);
            const ctx = canvas.getContext('2d');

            if (graphType === 'pie') {
                myChart = new Chart(ctx, {
                    type: 'pie',
                    data: { labels, datasets: [{ data: dataToUse.map(Math.abs), backgroundColor: pieColors.slice(0, labels.length), hoverOffset: 10 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right' }, datalabels: { display: true, color: '#1F2937', font: { weight: 'bold', size: 14 }, formatter: v => formatCurrency(v), anchor: 'end', align: 'end' } } },
                });
            } else {
                const dataset = {
                    label: plgSubGraph === 'Cumulative' ? 'Cumulative Profit' : 'Sequenced Profit',
                    data: dataToUse,
                    backgroundColor: graphType === 'bar' ? segColors : 'rgba(0,0,0,0)',
                    borderColor: segColors,
                    borderWidth: 3,
                    fill: false,
                    tension: 0.4,
                    pointRadius: 5,
                    pointBackgroundColor: segColors,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    spanGaps: true,
                };

                myChart = new Chart(ctx, {
                    type: graphType,
                    data: { labels, datasets: [dataset] },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' },
                            tooltip: { mode: 'index', intersect: false, callbacks: { label: ctx => (ctx.dataset.label || '') + ': ' + formatCurrency2(ctx.parsed.y) } },
                            datalabels: {
                                color: (ctx) => fontColors[ctx.dataIndex] || '#1F2937',
                                display: (ctx) => ctx.dataset.data[ctx.dataIndex] !== null,
                                formatter: v => formatCurrency(v),
                                font: { weight: 'bold' },
                                align: ctx => ctx.dataset.data[ctx.dataIndex] < 0 ? 'end' : 'start',
                                anchor: ctx => ctx.dataset.data[ctx.dataIndex] < 0 ? 'end' : 'start',
                                offset: 5, padding: 5, rotation: 270,
                            },
                        },
                        scales: {
                            x: { ticks: { color: '#6B7280' }, grid: { color: '#E8E8E8' } },
                            y: {
                                beginAtZero: false,
                                afterDataLimits: (axis) => {
                                    const d = axis.chart.data.datasets[0].data;
                                    const min = Math.min(...d), max = Math.max(...d);
                                    const range = (max - min) || 1;
                                    axis.min = Math.min(min, 0) - range * 0.15;
                                    axis.max = Math.max(max, 0) + range * 0.15;
                                },
                                ticks: { callback: v => '$' + new Intl.NumberFormat('en-US', { notation: 'compact', compactDisplay: 'short' }).format(v), color: '#6B7280' },
                                grid: { color: '#E8E8E8' },
                            },
                        },
                    },
                });
            }
        }

        // ── Tab switching ─────────────────────────────────────────
        window.openTab = function(evt, tabName) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).style.display = 'block';
            evt.currentTarget.classList.add('active');

            if (tabName === 'CurrentOverhead') {
                renderOverheadTable();
            }
        };

        // ── Overhead table (stub — needs Supabase table) ──────────
        function renderOverheadTable() {
            const tableBody = document.querySelector('#overhead_table tbody');
            const noDataMessage = document.getElementById('no_overhead_data_message');
            tableBody.innerHTML = '';
            noDataMessage.style.display = 'block';
            noDataMessage.textContent = 'Overhead data will be available once an overhead table is created in Supabase.';
        }

        // ── Event listeners ───────────────────────────────────────
        document.getElementById('table_filter_search_button').addEventListener('click', loadData);
        document.getElementById('start_date_internal').addEventListener('change', loadData);
        document.getElementById('end_date_internal').addEventListener('change', loadData);
        document.getElementById('company_search_internal').addEventListener('input', processData);
        document.getElementById('table_filter_branch_select').addEventListener('change', processData);
        document.querySelectorAll('input[name="plg_radio_filter"]').forEach(r => r.addEventListener('change', processData));
        document.getElementById('graph_filter_interval_select').addEventListener('change', renderGraph);
        document.getElementById('graph_filter_type_select').addEventListener('change', renderGraph);
        document.getElementById('graph_filter_plg_sub_select').addEventListener('change', renderGraph);
        document.getElementById('print_page_button').addEventListener('click', () => window.print());

        // Table header sorting
        document.querySelectorAll('#branch_table th').forEach((th, idx) => {
            th.style.cursor = 'pointer';
            th.addEventListener('click', () => {
                const tbody = document.getElementById('branch_table_body');
                const rows = Array.from(tbody.querySelectorAll('tr'));
                const isAsc = th.classList.contains('sort-asc');
                document.querySelectorAll('#branch_table th').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                th.classList.add(isAsc ? 'sort-desc' : 'sort-asc');
                rows.sort((a, b) => {
                    const aVal = a.children[idx]?.textContent.trim() || '';
                    const bVal = b.children[idx]?.textContent.trim() || '';
                    if (idx > 0) {
                        const numA = parseFloat(aVal.replace(/[^0-9.-]+/g, ''));
                        const numB = parseFloat(bVal.replace(/[^0-9.-]+/g, ''));
                        return (isAsc ? -1 : 1) * (numA - numB);
                    }
                    return (isAsc ? -1 : 1) * aVal.localeCompare(bVal);
                });
                rows.forEach(r => tbody.appendChild(r));
            });
        });

        // Overhead form submission (stub)
        document.getElementById('overhead_form').addEventListener('submit', function(e) {
            e.preventDefault();
            const messageDiv = document.getElementById('overhead_message');
            messageDiv.innerHTML = '<div class="overhead-message success">Overhead entry submitted (will be connected once an overhead table is created in Supabase).</div>';
            this.reset();
        });

        // Open first tab by default
        document.querySelector('.tab-button').click();

        // ── Initial load ──────────────────────────────────────────
        await loadData();
    </script>
</body>
</html>
