<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Worker Assignments – TalentLedger</title>
  <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
  <link rel="stylesheet" href="./src/design-system.css">
  <style>
    .form-section { background:var(--bg-paper); border:1px solid var(--border-color); border-radius:var(--radius); padding:22px 24px; margin-bottom:20px; }
    .form-section h3 { font-size:.95rem; font-weight:700; color:var(--text-primary); margin-bottom:16px; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:12px; }
    .form-field { display:flex; flex-direction:column; gap:5px; }
    .form-field label { font-size:.75rem; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.4px; }
    .form-field input, .form-field select, .form-field textarea {
      padding:8px 11px; border:1px solid var(--border-color); border-radius:6px;
      font-family:var(--font); font-size:.875rem; background:var(--bg-default); color:var(--text-primary);
    }
    .form-field input:focus, .form-field select:focus { outline:none; border-color:var(--primary); }
    .form-field textarea { resize:vertical; min-height:60px; }
    .form-actions { margin-top:16px; display:flex; gap:10px; align-items:center; }
    .error-msg   { color:#dc2626; font-size:.8rem; display:none; }
    .error-msg.show { display:block; }
    .success-msg { color:#16a34a; font-size:.8rem; display:none; }
    .success-msg.show { display:block; }

    .action-bar { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
    .action-bar-spacer { flex:1; }
    .filter-select, .filter-input { padding:8px 12px; border:1px solid var(--border-color); border-radius:var(--radius); font-family:var(--font); font-size:.85rem; background:var(--bg-paper); color:var(--text-primary); }
    .filter-select:focus, .filter-input:focus { outline:none; border-color:var(--primary); }

    .table-wrap { overflow-x:auto; border-radius:var(--radius); border:1px solid var(--border-color); }
    .data-table { width:100%; border-collapse:collapse; font-size:.85rem; }
    .data-table th { background:var(--primary); color:#fff; padding:10px 14px; text-align:left; font-size:.78rem; font-weight:600; text-transform:uppercase; letter-spacing:.4px; white-space:nowrap; }
    .data-table td { padding:10px 14px; border-bottom:1px solid var(--border-color); color:var(--text-primary); vertical-align:middle; }
    .data-table tbody tr:last-child td { border-bottom:none; }
    .data-table tbody tr:hover { background:var(--bg-default); }
    .empty-state { text-align:center; padding:40px; color:var(--text-secondary); }

    .badge { display:inline-block; padding:2px 10px; border-radius:999px; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.3px; }
    .badge-status-pending    { background:#FEF9C3; color:#854D0E; }
    .badge-status-open       { background:#DBEAFE; color:#1D4ED8; }
    .badge-status-in_progress{ background:#D1FAE5; color:#065F46; }
    .badge-status-completed  { background:#F3F4F6; color:#4B5563; }
    .badge-status-cancelled  { background:#FEE2E2; color:#991B1B; }

    /* ── Assign modal ── */
    .modal-backdrop { position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; display:none; align-items:center; justify-content:center; padding:16px; }
    .modal-backdrop.open { display:flex; }
    .modal { background:#fff; border-radius:16px; width:100%; max-width:520px; box-shadow:0 20px 50px rgba(0,0,0,0.25); overflow:hidden; }
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 22px 14px; border-bottom:1px solid #F3F4F6; }
    .modal-title { font-size:1rem; font-weight:700; color:#111827; }
    .modal-close { background:none; border:none; font-size:1.2rem; color:#9CA3AF; cursor:pointer; }
    .modal-body { padding:18px 22px; max-height:60vh; overflow-y:auto; }
    .modal-footer { padding:14px 22px; border-top:1px solid #F3F4F6; display:flex; gap:10px; justify-content:flex-end; }

    .worker-result { display:flex; align-items:center; gap:12px; padding:10px; border:1px solid #E5E7EB; border-radius:8px; margin-bottom:8px; cursor:pointer; transition:background .12s; }
    .worker-result:hover { background:#F9FAFB; }
    .worker-result.selected { background:#FEF3E6; border-color:#EA8938; }
    .worker-result-name { font-size:.88rem; font-weight:600; color:#111827; }
    .worker-result-meta { font-size:.76rem; color:#6B7280; }
    .worker-hours-input { width:80px; padding:5px 8px; border:1px solid #E5E7EB; border-radius:6px; font-size:.85rem; }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div id="topbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>
    <div class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">Worker Assignments</h1>
          <p class="page-subtitle">Create events, assign workers, and manage placements</p>
        </div>
      </div>

      <!-- Create event form -->
      <div class="form-section">
        <h3>Create New Event</h3>
        <div class="form-grid">
          <div class="form-field">
            <label>Invoice # <span style="color:#dc2626">*</span></label>
            <input type="text" id="ev-invoice" placeholder="INV-2026-001">
          </div>
          <div class="form-field">
            <label>Event Name <span style="color:#dc2626">*</span></label>
            <input type="text" id="ev-name" placeholder="Warehouse Staffing – March">
          </div>
          <div class="form-field">
            <label>Company / Client</label>
            <input type="text" id="ev-company" placeholder="Acme Corp">
          </div>
          <div class="form-field">
            <label>Event Date <span style="color:#dc2626">*</span></label>
            <input type="date" id="ev-date">
          </div>
          <div class="form-field">
            <label>Start Time</label>
            <input type="time" id="ev-start">
          </div>
          <div class="form-field">
            <label>End Time</label>
            <input type="time" id="ev-end">
          </div>
          <div class="form-field">
            <label>Workers Needed</label>
            <input type="number" id="ev-workers" min="1" value="1">
          </div>
          <div class="form-field">
            <label>Role / Type</label>
            <input type="text" id="ev-role" placeholder="General Labor">
          </div>
          <div class="form-field">
            <label>Location / Address</label>
            <input type="text" id="ev-location" placeholder="123 Main St, Chicago IL">
          </div>
          <div class="form-field" style="grid-column:1/-1">
            <label>Description</label>
            <textarea id="ev-desc" placeholder="Any additional details…"></textarea>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="createEvent()" style="font-size:.85rem;padding:9px 20px;">Create Event</button>
          <span class="error-msg"   id="ev-error"></span>
          <span class="success-msg" id="ev-success"></span>
        </div>
      </div>

      <!-- Events list -->
      <div class="action-bar">
        <select class="filter-select" id="ev-filter-status" onchange="loadEvents()">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <div class="action-bar-spacer"></div>
        <button class="btn btn-outlined" onclick="loadEvents()" style="font-size:.82rem;padding:7px 14px;">↻ Refresh</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th>Invoice #</th>
            <th>Event Name</th>
            <th>Company</th>
            <th>Date</th>
            <th>Time</th>
            <th>Role</th>
            <th>Workers Needed</th>
            <th>Assigned</th>
            <th>Status</th>
            <th>Actions</th>
          </tr></thead>
          <tbody id="events-tbody">
            <tr><td colspan="10" class="empty-state">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ── Assign Workers Modal ── -->
<div class="modal-backdrop" id="assign-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="assign-modal-title">Assign Workers</div>
      <button class="modal-close" onclick="closeAssignModal()">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:.82rem;color:#6B7280;margin-bottom:12px;" id="assign-event-info"></p>
      <div style="display:flex;gap:8px;margin-bottom:14px;">
        <input type="text" id="assign-search" class="filter-input" placeholder="Search workers by name or ID…"
          oninput="searchWorkers()" style="flex:1;">
      </div>
      <div id="assign-results">
        <p style="font-size:.85rem;color:#9CA3AF;text-align:center;padding:20px 0;">Search for a worker above.</p>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outlined" onclick="closeAssignModal()" style="font-size:.85rem;">Cancel</button>
      <button class="btn btn-primary" id="assign-save-btn" onclick="saveAssignment()" style="font-size:.85rem;">Assign Selected</button>
    </div>
  </div>
</div>

<script type="module">
  import { renderNavbar }  from './src/components/navbar.js';
  import { renderSidebar } from './src/components/sidebar.js';
  import { checkAuth, checkPageAccess } from './src/auth.js';
  import { supabase } from './src/supabaseClient.js';

  await checkAuth();
  await checkPageAccess('worker-assignments');
  renderNavbar();
  await renderSidebar();

  // ── Helpers ──────────────────────────────────────────────
  function msg(id, text, type = 'error') {
    const el = document.getElementById(id);
    el.textContent = text;
    el.className = (type === 'success' ? 'success-msg' : 'error-msg') + ' show';
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function fmtDate(d) {
    return d ? new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }) : '—';
  }

  function statusBadge(status) {
    const cls = { pending:'badge-status-pending', open:'badge-status-open', in_progress:'badge-status-in_progress', completed:'badge-status-completed', cancelled:'badge-status-cancelled' };
    return `<span class="badge ${cls[status] || ''}">${(status || '').replace('_',' ')}</span>`;
  }

  // ── Create event ─────────────────────────────────────────
  window.createEvent = async function() {
    const invoice  = document.getElementById('ev-invoice').value.trim();
    const name     = document.getElementById('ev-name').value.trim();
    const company  = document.getElementById('ev-company').value.trim();
    const date     = document.getElementById('ev-date').value;
    const start    = document.getElementById('ev-start').value;
    const end      = document.getElementById('ev-end').value;
    const needed   = parseInt(document.getElementById('ev-workers').value) || 1;
    const role     = document.getElementById('ev-role').value.trim();
    const location = document.getElementById('ev-location').value.trim();
    const desc     = document.getElementById('ev-desc').value.trim();

    if (!invoice || !name || !date) { msg('ev-error', 'Invoice #, Event Name, and Date are required.'); return; }

    const { error } = await supabase.from('events').insert({
      invoice_number: invoice, name, company, event_date: date,
      start_time: start || null, end_time: end || null,
      workers_needed: needed, role, location, description: desc, status: 'open',
    });
    if (error) { msg('ev-error', error.message); return; }

    msg('ev-success', `Event "${name}" created.`, 'success');
    ['ev-invoice','ev-name','ev-company','ev-date','ev-start','ev-end','ev-role','ev-location','ev-desc']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('ev-workers').value = '1';
    loadEvents();
  };

  // ── Load events ──────────────────────────────────────────
  window.loadEvents = async function() {
    const statusFilter = document.getElementById('ev-filter-status').value;
    const tbody = document.getElementById('events-tbody');
    tbody.innerHTML = '<tr><td colspan="10" class="empty-state">Loading…</td></tr>';

    let q = supabase.from('events').select('*, event_assignments(id)').order('event_date', { ascending: false });
    if (statusFilter) q = q.eq('status', statusFilter);
    const { data, error } = await q;

    if (error || !data?.length) {
      tbody.innerHTML = `<tr><td colspan="10" class="empty-state">${error ? 'Error loading.' : 'No events found.'}</td></tr>`;
      return;
    }

    tbody.innerHTML = data.map(e => `<tr>
      <td style="font-weight:600;font-family:monospace">${e.invoice_number}</td>
      <td style="font-weight:600">${e.name}</td>
      <td>${e.company || '—'}</td>
      <td>${fmtDate(e.event_date)}</td>
      <td style="white-space:nowrap;font-size:.82rem">${e.start_time || '—'} – ${e.end_time || '—'}</td>
      <td>${e.role || '—'}</td>
      <td style="text-align:center">${e.workers_needed}</td>
      <td style="text-align:center">${e.event_assignments?.length ?? 0}</td>
      <td>${statusBadge(e.status)}</td>
      <td style="white-space:nowrap;">
        <button class="btn btn-outlined" style="font-size:.75rem;padding:4px 10px;"
          onclick="openAssignModal('${e.id}', '${e.name.replace(/'/g,"\\'")}', '${e.company || ''}')">Assign</button>
        <select onchange="updateEventStatus('${e.id}', this.value)"
          style="font-size:.75rem;padding:3px 6px;border:1px solid var(--border-color);border-radius:4px;margin-left:4px;">
          <option value="">Status…</option>
          <option value="pending">Pending</option>
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </td>
    </tr>`).join('');
  };

  window.updateEventStatus = async function(eventId, status) {
    if (!status) return;
    await supabase.from('events').update({ status }).eq('id', eventId);
    loadEvents();
  };

  // ── Assign workers modal ──────────────────────────────────
  let currentEventId = null;
  let selectedWorker = null;

  window.openAssignModal = function(eventId, eventName, company) {
    currentEventId  = eventId;
    selectedWorker  = null;
    document.getElementById('assign-modal-title').textContent = `Assign Workers — ${eventName}`;
    document.getElementById('assign-event-info').textContent  = company ? `Client: ${company}` : '';
    document.getElementById('assign-search').value  = '';
    document.getElementById('assign-results').innerHTML =
      '<p style="font-size:.85rem;color:#9CA3AF;text-align:center;padding:20px 0;">Search for a worker above.</p>';
    document.getElementById('assign-modal').classList.add('open');
  };

  window.closeAssignModal = function() {
    document.getElementById('assign-modal').classList.remove('open');
    currentEventId = null; selectedWorker = null;
  };

  let searchTimeout;
  window.searchWorkers = function() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(doSearch, 280);
  };

  async function doSearch() {
    const q = document.getElementById('assign-search').value.trim();
    const container = document.getElementById('assign-results');
    if (!q) {
      container.innerHTML = '<p style="font-size:.85rem;color:#9CA3AF;text-align:center;padding:20px 0;">Search for a worker above.</p>';
      return;
    }
    container.innerHTML = '<p style="font-size:.85rem;color:#9CA3AF;text-align:center;padding:20px 0;">Searching…</p>';

    const { data } = await supabase.from('workers')
      .select('id, name, employee_id, company, role')
      .or(`name.ilike.%${q}%,employee_id.ilike.%${q}%`)
      .eq('is_active', true).limit(15);

    if (!data?.length) {
      container.innerHTML = '<p style="font-size:.85rem;color:#9CA3AF;text-align:center;padding:20px 0;">No workers found.</p>';
      return;
    }

    container.innerHTML = data.map(w => `
      <div class="worker-result" id="wr-${w.id}" onclick="selectWorker('${w.id}', '${w.name.replace(/'/g,"\\'")}')">
        <div style="flex:1;">
          <div class="worker-result-name">${w.name}</div>
          <div class="worker-result-meta">${[w.employee_id, w.company, w.role].filter(Boolean).join(' · ')}</div>
        </div>
        <div>
          <label style="font-size:.75rem;color:#6B7280;font-weight:600;">Hours</label><br>
          <input class="worker-hours-input" type="number" min="0" step="0.5" placeholder="hrs"
            id="hrs-${w.id}" onclick="event.stopPropagation()">
        </div>
      </div>
    `).join('');
  }

  window.selectWorker = function(id, name) {
    document.querySelectorAll('.worker-result').forEach(el => el.classList.remove('selected'));
    document.getElementById('wr-' + id)?.classList.add('selected');
    selectedWorker = { id, name };
  };

  window.saveAssignment = async function() {
    if (!selectedWorker) { alert('Please select a worker first.'); return; }
    const hours = parseFloat(document.getElementById('hrs-' + selectedWorker.id)?.value) || null;
    const btn = document.getElementById('assign-save-btn');
    btn.disabled = true; btn.textContent = 'Assigning…';
    try {
      const { error } = await supabase.from('event_assignments').upsert({
        event_id: currentEventId, worker_id: selectedWorker.id,
        worker_name: selectedWorker.name, hours_assigned: hours,
        status: 'assigned',
      }, { onConflict: 'event_id,worker_id' });
      if (error) throw error;
      closeAssignModal();
      loadEvents();
    } catch (err) {
      alert('Error: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Assign Selected';
    }
  };

  // Close on backdrop click
  document.getElementById('assign-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('assign-modal')) closeAssignModal();
  });

  // ── Initial load ──────────────────────────────────────────
  loadEvents();
</script>
</body>
</html>
