<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Descending Revenue</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .report-layout {
            display: grid; grid-template-columns: 35% 1fr; grid-template-rows: auto 1fr; gap: 16px;
        }
        .report-tabs { grid-row: 1; grid-column: 1 / 3; }
        .report-table-section { grid-row: 2; grid-column: 1; display: flex; flex-direction: column; }
        .report-chart-section { grid-row: 2; grid-column: 2; display: flex; flex-direction: column; }
        .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px; }
        .table-scroll { overflow-y: auto; max-height: calc(100vh - 340px); }
        .total-bar {
            background-color: var(--primary); color: #fff; padding: 8px 12px;
            border-radius: 0 0 8px 8px; text-align: center; font-weight: 700; font-size: 15px;
        }
        .chart-wrap { position: relative; flex: 1; min-height: 300px; padding: 12px; }
        .loading-indicator { text-align: center; padding: 40px; color: var(--text-secondary); }
        @media (max-width: 900px) {
            .report-layout { grid-template-columns: 1fr; }
            .report-chart-section { grid-column: 1; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Descending Revenue</h1>
            </div>
            <div class="report-layout">
                <div class="report-tabs">
                    <div class="card" style="padding:8px;">
                        <div class="tab-nav" style="margin:0;border:0;">
                            <a href="./profit-loss.html" class="tab-nav-item">P&L</a>
                            <a href="./descending-revenue.html" class="tab-nav-item active">Desc. Revenue</a>
                            <a href="./direct-hire.html" class="tab-nav-item">Direct Hire</a>
                            <a href="./general-staffing.html" class="tab-nav-item">Gen. Staffing</a>
                            <div style="flex:1;display:flex;gap:6px;justify-content:flex-end;align-items:center;">
                                <input class="form-input" type="date" id="start_date" style="max-width:150px;">
                                <input class="form-input" type="date" id="end_date" style="max-width:150px;">
                                <input class="form-input" type="text" id="company_search" placeholder="Search company..." style="max-width:180px;">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="report-table-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="filter-bar">
                            <select class="form-select" id="table_branch_filter">
                                <option value="all" selected>All Branches</option>
                            </select>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
                                <input type="checkbox" id="dhp_filter"> DHP
                            </label>
                            <label style="display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary);cursor:pointer;">
                                <input type="checkbox" id="gsp_filter"> GSP
                            </label>
                            <button class="btn btn-primary" type="button" id="apply-btn" style="padding:6px 16px;">Apply</button>
                        </div>
                        <div class="table-scroll">
                            <table class="data-table" id="revenue-table">
                                <thead>
                                    <tr>
                                        <th class="sortable" data-col="company">Company</th>
                                        <th class="sortable" data-col="branch">Branch</th>
                                        <th class="sortable" data-col="revenue" style="text-align:right">Revenue</th>
                                    </tr>
                                </thead>
                                <tbody id="revenue-table-body">
                                    <tr><td colspan="3" class="loading-indicator">Loading data...</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="total-bar" id="total-revenue">Total: $0</div>
                    </div>
                </div>
                <div class="report-chart-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="filter-bar">
                            <select class="form-select" id="graph_type">
                                <option value="bar" selected>Bar</option>
                                <option value="line">Line</option>
                                <option value="pie">Pie</option>
                            </select>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="revenueChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, checkPageAccess } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';
        import { fetchInvoiceRegister, formatCurrency, getDefaultStartDate, getDefaultEndDate } from './src/apiClient.js';

        await checkAuth();
        await checkPageAccess('descending-revenue');
        renderNavbar();
        await renderSidebar();
        initInactivityTimer();

        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#6B7280';

        // ── State ─────────────────────────────────────────────────
        let rawData = [];
        let aggregated = [];
        let timeSeriesData = [];
        let uniqueBranches = [];
        let revenueChart = null;
        let sortCol = 'revenue';
        let sortDir = 'desc';

        // ── Init dates ────────────────────────────────────────────
        document.getElementById('start_date').value = getDefaultStartDate();
        document.getElementById('end_date').value = getDefaultEndDate();

        // ── Fetch & process ───────────────────────────────────────
        async function loadData() {
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            if (!startDate || !endDate) return;

            document.getElementById('revenue-table-body').innerHTML =
                '<tr><td colspan="3" class="loading-indicator">Loading data...</td></tr>';

            try {
                rawData = await fetchInvoiceRegister(startDate, endDate);
                processData();
            } catch (err) {
                document.getElementById('revenue-table-body').innerHTML =
                    `<tr><td colspan="3" class="loading-indicator" style="color:#DC2626">Error: ${err.message}</td></tr>`;
            }
        }

        function processData() {
            const branchFilter = document.getElementById('table_branch_filter').value;
            const dhpOn = document.getElementById('dhp_filter').checked;
            const gspOn = document.getElementById('gsp_filter').checked;
            const search = document.getElementById('company_search').value.trim().toLowerCase();

            const branchSet = new Set();
            rawData.forEach(r => { if (r.branchname) branchSet.add(r.branchname); });
            uniqueBranches = [...branchSet].sort();
            populateBranchDropdowns();

            let filtered = rawData.filter(r => {
                if (branchFilter !== 'all' && r.branchname !== branchFilter) return false;
                const isDHP = r.customername && r.customername.toUpperCase().includes('DHP');
                if (dhpOn && !isDHP) return false;
                if (gspOn && isDHP) return false;
                if (search && !(r.customername || '').toLowerCase().includes(search)) return false;
                return true;
            });

            // Aggregate by company (for table)
            const agg = {};
            filtered.forEach(r => {
                const key = r.customername || 'Unknown';
                if (!agg[key]) agg[key] = { company: key, branch: r.branchname || '', revenue: 0, branches: new Set() };
                agg[key].revenue += Number(r.invoiceamount) || 0;
                if (r.branchname) agg[key].branches.add(r.branchname);
            });
            aggregated = Object.values(agg).map(a => ({
                company: a.company, branch: [...a.branches].join(', '), revenue: a.revenue,
            }));

            // Aggregate by week for time-series chart
            const weekMap = {};
            filtered.forEach(r => {
                const week = r.weekendbill || 'Unknown';
                if (!weekMap[week]) weekMap[week] = 0;
                weekMap[week] += Number(r.invoiceamount) || 0;
            });
            timeSeriesData = Object.entries(weekMap)
                .map(([week, revenue]) => ({ week, revenue }))
                .sort((a, b) => a.week.localeCompare(b.week));

            sortData();
            renderTable();
            renderChart();
        }

        function sortData() {
            aggregated.sort((a, b) => {
                let cmp = 0;
                if (sortCol === 'revenue') cmp = a.revenue - b.revenue;
                else cmp = (a[sortCol] || '').localeCompare(b[sortCol] || '');
                return sortDir === 'asc' ? cmp : -cmp;
            });
        }

        // ── Render table ──────────────────────────────────────────
        function renderTable() {
            const tbody = document.getElementById('revenue-table-body');
            tbody.innerHTML = '';
            let total = 0;
            if (aggregated.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="loading-indicator">No data for selected filters.</td></tr>';
            } else {
                aggregated.forEach(row => {
                    total += row.revenue;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${row.company}</td>
                        <td>${row.branch}</td>
                        <td style="text-align:right;font-weight:600">${formatCurrency(row.revenue)}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
            document.getElementById('total-revenue').textContent = `Total: ${formatCurrency(total)}`;
        }

        // ── Linear regression for trendline ───────────────────────
        function linearRegression(data) {
            const n = data.length;
            if (n < 2) return null;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            data.forEach((y, i) => { sumX += i; sumY += y; sumXY += i * y; sumX2 += i * i; });
            const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;
            return data.map((_, i) => slope * i + intercept);
        }

        // ── Render chart (time-series) ────────────────────────────
        function renderChart() {
            const ctx = document.getElementById('revenueChart').getContext('2d');
            if (revenueChart) revenueChart.destroy();

            const type = document.getElementById('graph_type').value;

            if (type === 'pie') {
                // Pie: show top companies
                const top = aggregated.slice(0, 15);
                const colors = top.map((_, i) => `hsl(${260 + i * 18}, 60%, ${55 + (i % 3) * 8}%)`);
                revenueChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: top.map(c => c.company),
                        datasets: [{ data: top.map(c => c.revenue), backgroundColor: colors }],
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { position: 'right', labels: { font: { size: 11 } } } },
                    },
                });
            } else {
                // Bar/Line: time-series by week
                const labels = timeSeriesData.map(d => d.week);
                const values = timeSeriesData.map(d => d.revenue);
                const datasets = [{
                    label: 'Descending Revenue',
                    data: values,
                    backgroundColor: 'rgba(124,58,237,0.7)',
                    borderColor: 'rgb(124,58,237)',
                    borderWidth: 2,
                    fill: type === 'line' ? false : undefined,
                    tension: 0.3,
                }];

                // Add trendline
                const trend = linearRegression(values);
                if (trend) {
                    datasets.push({
                        label: 'Trend',
                        data: trend,
                        type: 'line',
                        borderColor: 'rgba(239,68,68,0.7)',
                        borderWidth: 2,
                        borderDash: [6, 3],
                        pointRadius: 0,
                        fill: false,
                    });
                }

                revenueChart = new Chart(ctx, {
                    type: type,
                    data: { labels, datasets },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        scales: {
                            x: { ticks: { maxRotation: 45, font: { size: 10 } } },
                            y: { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } },
                        },
                        plugins: { legend: { labels: { font: { size: 11 } } } },
                    },
                });
            }
        }

        // ── Populate branch dropdowns from API data ───────────────
        function populateBranchDropdowns() {
            const sel = document.getElementById('table_branch_filter');
            const current = sel.value;
            sel.innerHTML = '<option value="all">All Branches</option>';
            uniqueBranches.forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                if (b === current) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        // ── Column sorting ────────────────────────────────────────
        document.querySelectorAll('.sortable').forEach(th => {
            th.addEventListener('click', () => {
                const col = th.dataset.col;
                if (sortCol === col) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
                else { sortCol = col; sortDir = col === 'revenue' ? 'desc' : 'asc'; }
                document.querySelectorAll('.sortable').forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
                th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
                sortData();
                renderTable();
            });
        });

        // ── Event listeners ───────────────────────────────────────
        document.getElementById('apply-btn').addEventListener('click', loadData);
        document.getElementById('start_date').addEventListener('change', loadData);
        document.getElementById('end_date').addEventListener('change', loadData);
        document.getElementById('company_search').addEventListener('input', processData);
        document.getElementById('table_branch_filter').addEventListener('change', processData);
        document.getElementById('dhp_filter').addEventListener('change', processData);
        document.getElementById('gsp_filter').addEventListener('change', processData);
        document.getElementById('graph_type').addEventListener('change', renderChart);

        // ── Initial load ──────────────────────────────────────────
        await loadData();
    </script>
</body>
</html>
