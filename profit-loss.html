<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Profit & Loss</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .report-layout {
            display: grid; grid-template-columns: 35% 1fr; grid-template-rows: auto 1fr; gap: 16px;
        }
        .report-tabs { grid-row: 1; grid-column: 1 / 3; }
        .report-table-section { grid-row: 2; grid-column: 1; display: flex; flex-direction: column; }
        .report-chart-section { grid-row: 2; grid-column: 2; display: flex; flex-direction: column; }
        .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px; }
        .table-scroll { overflow-y: auto; max-height: calc(100vh - 340px); }
        .total-bar {
            background-color: var(--primary); color: #fff; padding: 8px 12px;
            border-radius: 0 0 8px 8px; text-align: center; font-weight: 700; font-size: 15px;
        }
        .chart-wrap { position: relative; flex: 1; min-height: 300px; padding: 12px; }
        .radio-group { display: flex; gap: 12px; align-items: center; padding: 4px 12px; }
        .radio-group label { color: var(--text-primary); font-weight: 500; cursor: pointer; font-size: 14px; }
        @media (max-width: 900px) {
            .report-layout { grid-template-columns: 1fr; }
            .report-chart-section { grid-column: 1; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Profit & Loss</h1>
            </div>
            <div class="report-layout">
                <div class="report-tabs">
                    <div class="card" style="padding:8px;">
                        <div class="tab-nav" style="margin:0;border:0;">
                            <a href="./profit-loss.html" class="tab-nav-item active">P&L</a>
                            <a href="./descending-revenue.html" class="tab-nav-item">Desc. Revenue</a>
                            <a href="./direct-hire.html" class="tab-nav-item">Direct Hire</a>
                            <a href="./general-staffing.html" class="tab-nav-item">Gen. Staffing</a>
                            <div style="flex:1;display:flex;gap:6px;justify-content:flex-end;align-items:center;">
                                <input class="form-input" type="date" id="start_date" style="max-width:150px;">
                                <input class="form-input" type="date" id="end_date" style="max-width:150px;">
                                <input class="form-input" type="text" id="company_search" placeholder="Search company..." style="max-width:180px;">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="report-table-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="filter-bar">
                            <select class="form-select" id="table_branch_filter">
                                <option value="all" selected>All Branches</option>
                                <option value="Austell">Austell</option>
                                <option value="Rome">Rome</option>
                                <option value="Kennesaw">Kennesaw</option>
                            </select>
                            <span class="btn btn-outlined" style="cursor:pointer;padding:6px 12px;" onclick="applyFilters()">DHP</span>
                            <span class="btn btn-outlined" style="cursor:pointer;padding:6px 12px;">GSP</span>
                            <button class="btn btn-primary" type="button" onclick="applyFilters()" style="padding:6px 16px;">Apply</button>
                        </div>
                        <div class="table-scroll">
                            <table class="data-table" id="branch-table">
                                <thead>
                                    <tr>
                                        <th>Branch</th>
                                        <th style="text-align:right">Revenue</th>
                                        <th style="text-align:right">Profit</th>
                                        <th style="text-align:right">Overhead</th>
                                        <th style="text-align:right">Net</th>
                                    </tr>
                                </thead>
                                <tbody id="branch-table-body"></tbody>
                            </table>
                        </div>
                        <div class="total-bar" id="total-revenue">Total Revenue: $0.00</div>
                    </div>
                </div>
                <div class="report-chart-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="filter-bar">
                            <select class="form-select" id="graph_branch_filter">
                                <option value="all" selected>All Branches</option>
                                <option value="Austell">Austell</option>
                                <option value="Rome">Rome</option>
                                <option value="Kennesaw">Kennesaw</option>
                            </select>
                            <select class="form-select" id="graph_type">
                                <option value="bar" selected>Bar</option>
                                <option value="line">Line</option>
                            </select>
                            <select class="form-select" id="graph_interval">
                                <option value="weekly" selected>Weekly</option>
                                <option value="monthly">Monthly</option>
                            </select>
                            <button class="btn btn-primary" type="button" onclick="applyGraphFilters()" style="padding:6px 16px;">Apply</button>
                        </div>
                        <div class="radio-group">
                            <label><input type="radio" name="plg_radio" value="All" checked> All</label>
                            <label><input type="radio" name="plg_radio" value="DHP"> DHP</label>
                            <label><input type="radio" name="plg_radio" value="GSP"> GSP</label>
                        </div>
                        <div class="chart-wrap">
                            <canvas id="profitLossChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, checkPageAccess } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';

        await checkAuth();
        await checkPageAccess('profit-loss');
        renderNavbar();
        await renderSidebar();
        initInactivityTimer();
    </script>
    <script>
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#6B7280';

        const sampleBranches = ['Austell', 'Rome', 'Kennesaw', 'Cartersville', 'Adairsville'];
        const sampleRevenue = [52000, 38000, 45000, 28000, 31000];
        const sampleProfit = [7800, 5700, 6750, 4200, 4650];
        const sampleOverhead = [3500, 2800, 3200, 2100, 2400];

        const today = new Date();
        const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        document.getElementById('start_date').value = lastMonth.toISOString().split('T')[0];
        document.getElementById('end_date').value = today.toISOString().split('T')[0];

        function renderBranchTable() {
            const tbody = document.getElementById('branch-table-body');
            tbody.innerHTML = '';
            let total = 0;
            sampleBranches.forEach((branch, i) => {
                total += sampleRevenue[i];
                const net = sampleProfit[i] - sampleOverhead[i];
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${branch}</td>
                    <td style="text-align:right;font-weight:600">$${sampleRevenue[i].toLocaleString()}</td>
                    <td style="text-align:right;font-weight:600">$${sampleProfit[i].toLocaleString()}</td>
                    <td style="text-align:right;font-weight:600">$${sampleOverhead[i].toLocaleString()}</td>
                    <td style="text-align:right;font-weight:600;color:${net >= 0 ? '#059669' : '#DC2626'}">$${net.toLocaleString()}</td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('total-revenue').textContent = `Total Revenue: $${total.toLocaleString()}`;
        }

        let profitLossChart = null;
        function renderProfitLossChart() {
            const ctx = document.getElementById('profitLossChart').getContext('2d');
            if (profitLossChart) profitLossChart.destroy();
            profitLossChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: sampleBranches,
                    datasets: [
                        { label: 'Revenue', data: sampleRevenue, backgroundColor: 'rgba(124, 58, 237, 0.7)' },
                        { label: 'Profit', data: sampleProfit, backgroundColor: 'rgba(16, 185, 129, 0.7)' },
                        { label: 'Overhead', data: sampleOverhead, backgroundColor: 'rgba(239, 68, 68, 0.5)' }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
            });
        }

        function applyFilters() {
            alert('Profit & Loss filters will be connected once a data source table is created in Supabase.');
        }

        function applyGraphFilters() {
            alert('Graph filters will be connected once a data source table is created in Supabase.');
        }

        renderBranchTable();
        renderProfitLossChart();
    </script>
</body>
</html>
