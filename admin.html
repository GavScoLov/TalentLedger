<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Admin Panel</title>
    <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        .admin-table th { font-weight: 600; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg-secondary); }
        .admin-table tr:hover td { background: var(--bg-secondary); }
        .role-select { padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); font-size: 0.875rem; cursor: pointer; }
        .page-toggles { display: flex; flex-wrap: wrap; gap: 6px; }
        .page-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 99px; font-size: 0.75rem; border: 1px solid var(--border); background: var(--bg); cursor: pointer; transition: all 0.15s; user-select: none; }
        .page-toggle.active { background: rgba(var(--primary-rgb), 0.1); border-color: var(--primary); color: var(--primary); }
        .page-toggle input { display: none; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.8rem; margin-right: 8px; flex-shrink: 0; }
        .user-info { display: flex; align-items: center; }
        .user-email { color: var(--text-secondary); font-size: 0.8rem; }
        .save-btn { padding: 6px 14px; border-radius: var(--radius); border: none; background: var(--primary); color: white; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; }
        .save-btn:hover { opacity: 0.9; }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status-msg { padding: 8px 16px; border-radius: var(--radius); margin-bottom: 16px; font-size: 0.875rem; display: none; }
        .status-msg.success { display: block; background: #DCFCE7; color: #16A34A; }
        .status-msg.error { display: block; background: #FEE2E2; color: #DC2626; }
        .admin-actions { display: flex; gap: 8px; align-items: center; }
        .delete-btn { padding: 6px 10px; border-radius: var(--radius); border: 1px solid #FCA5A5; background: #FEF2F2; color: #DC2626; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
        .delete-btn:hover { background: #FEE2E2; }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
        .loading { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
        @media (max-width: 768px) {
            .admin-table { display: block; overflow-x: auto; }
            .page-toggles { max-width: 200px; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title">Admin Panel</h1>
                    <p class="page-subtitle">Manage users, roles, and page access</p>
                </div>
            </div>

            <div id="status-msg" class="status-msg"></div>

            <div class="card" style="padding: 0; overflow: hidden;">
                <div id="users-loading" class="loading">Loading users...</div>
                <div id="users-empty" class="empty-state" style="display:none;">No users found.</div>
                <table class="admin-table" id="users-table" style="display:none;">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Page Access</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, isSuperAdmin, getAllUsers, updateUserRole, updateUserPages, deleteUserProfile, getUser } from './src/auth.js';
        import { supabase } from './src/supabaseClient.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';

        const currentUser = await checkAuth();
        await renderSidebar();
        renderNavbar();
        initInactivityTimer();

        // Only super admins can access this page
        const adminCheck = await isSuperAdmin();
        if (!adminCheck) {
            window.location.href = './dashboard.html';
            throw new Error('Not super admin');
        }

        const SITE_PAGES = [
            { slug: 'dashboard', label: 'Dashboard' },
            { slug: 'commission', label: 'Commission' },
            { slug: 'data-visualization', label: 'Descending Revenue' },
            { slug: 'hours-breakdown', label: 'Hours Breakdown' },
            { slug: 'profit-loss', label: 'Profit & Loss' },
            { slug: 'state-tax', label: 'State Tax' },
            { slug: 'roster-tracker', label: 'Company Tracker' },
            { slug: 'settings', label: 'Settings' },
        ];

        function showStatus(msg, type) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = 'status-msg ' + type;
            setTimeout(() => { el.className = 'status-msg'; }, 4000);
        }

        function renderUsers(users) {
            const loading = document.getElementById('users-loading');
            const empty = document.getElementById('users-empty');
            const table = document.getElementById('users-table');
            const tbody = document.getElementById('users-tbody');

            loading.style.display = 'none';

            if (!users.length) {
                empty.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            tbody.innerHTML = users.map(user => {
                const name = user.username || user.email || 'Unknown';
                const initial = name.charAt(0).toUpperCase();
                const allowedPages = user.allowed_pages || [];
                const isCurrentUser = user.id === currentUser.id;

                return `
                <tr data-user-id="${user.id}">
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${initial}</div>
                            <div>
                                <div>${name}${isCurrentUser ? ' <span style="color:var(--text-secondary);font-size:0.75rem;">(you)</span>' : ''}</div>
                                <div class="user-email">${user.email || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <select class="role-select" data-user-id="${user.id}" ${isCurrentUser ? 'disabled title="Cannot change your own role"' : ''}>
                            <option value="super_admin" ${user.role === 'super_admin' ? 'selected' : ''}>Super Admin</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                        </select>
                    </td>
                    <td>
                        <div class="page-toggles" data-user-id="${user.id}">
                            ${user.role === 'super_admin' ? '<span style="color:var(--text-secondary);font-size:0.8rem;">All pages (super admin)</span>' :
                            SITE_PAGES.map(p => `
                                <label class="page-toggle ${allowedPages.includes(p.slug) ? 'active' : ''}">
                                    <input type="checkbox" value="${p.slug}" ${allowedPages.includes(p.slug) ? 'checked' : ''}>
                                    ${p.label}
                                </label>
                            `).join('')}
                        </div>
                    </td>
                    <td>
                        <div class="admin-actions">
                            <button class="save-btn" data-user-id="${user.id}" ${isCurrentUser ? 'disabled' : ''}>Save</button>
                            ${!isCurrentUser ? `<button class="delete-btn" data-user-id="${user.id}">Remove</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }).join('');

            // Toggle page chips
            tbody.querySelectorAll('.page-toggle input').forEach(input => {
                input.addEventListener('change', () => {
                    input.parentElement.classList.toggle('active', input.checked);
                });
            });

            // Role change → update page toggles visibility
            tbody.querySelectorAll('.role-select').forEach(select => {
                select.addEventListener('change', () => {
                    const userId = select.dataset.userId;
                    const togglesContainer = tbody.querySelector(`.page-toggles[data-user-id="${userId}"]`);
                    if (select.value === 'super_admin') {
                        togglesContainer.innerHTML = '<span style="color:var(--text-secondary);font-size:0.8rem;">All pages (super admin)</span>';
                    } else {
                        const user = users.find(u => u.id === userId);
                        const allowedPages = user?.allowed_pages || [];
                        togglesContainer.innerHTML = SITE_PAGES.map(p => `
                            <label class="page-toggle ${allowedPages.includes(p.slug) ? 'active' : ''}">
                                <input type="checkbox" value="${p.slug}" ${allowedPages.includes(p.slug) ? 'checked' : ''}>
                                ${p.label}
                            </label>
                        `).join('');
                        togglesContainer.querySelectorAll('.page-toggle input').forEach(input => {
                            input.addEventListener('change', () => {
                                input.parentElement.classList.toggle('active', input.checked);
                            });
                        });
                    }
                });
            });

            // Save button
            tbody.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const userId = btn.dataset.userId;
                    btn.disabled = true;
                    btn.textContent = 'Saving...';
                    try {
                        const row = btn.closest('tr');
                        const role = row.querySelector('.role-select').value;
                        await updateUserRole(userId, role);

                        if (role !== 'super_admin') {
                            const checkboxes = row.querySelectorAll('.page-toggle input');
                            const pages = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
                            await updateUserPages(userId, pages);
                        }

                        showStatus('User updated successfully.', 'success');
                        const user = users.find(u => u.id === userId);
                        if (user) {
                            user.role = role;
                            if (role !== 'super_admin') {
                                const checkboxes = row.querySelectorAll('.page-toggle input');
                                user.allowed_pages = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
                            }
                        }
                    } catch (err) {
                        showStatus('Failed to update user: ' + err.message, 'error');
                    }
                    btn.disabled = false;
                    btn.textContent = 'Save';
                });
            });

            // Delete button
            tbody.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const userId = btn.dataset.userId;
                    const user = users.find(u => u.id === userId);
                    if (!confirm(`Remove ${user?.username || user?.email || 'this user'}? This removes their profile but not their auth account.`)) return;
                    try {
                        await deleteUserProfile(userId);
                        showStatus('User profile removed.', 'success');
                        users = users.filter(u => u.id !== userId);
                        renderUsers(users);
                    } catch (err) {
                        showStatus('Failed to remove user: ' + err.message, 'error');
                    }
                });
            });
        }

        // Load users
        try {
            let users = await getAllUsers();
            renderUsers(users);
        } catch (err) {
            document.getElementById('users-loading').textContent = 'Error loading users: ' + err.message;
        }
    </script>
</body>
</html>
