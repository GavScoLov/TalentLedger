<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Admin Panel</title>
    <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        /* ── Table base ─────────────────────────────────────────── */
        .admin-table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
        .admin-table th { font-weight: 600; color: var(--text-secondary); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; background: var(--bg-secondary); }
        .admin-table tr:last-child td { border-bottom: none; }

        /* ── User cell ──────────────────────────────────────────── */
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); color: white; display: inline-flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.8rem; margin-right: 8px; flex-shrink: 0; }
        .user-info { display: flex; align-items: center; }
        .user-email { color: var(--text-secondary); font-size: 0.8rem; }

        /* ── Role select ────────────────────────────────────────── */
        .role-select { padding: 6px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); font-size: 0.875rem; cursor: pointer; }

        /* ── Section group chip + dropdown ──────────────────────── */
        .page-access-grid { display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-start; }

        .section-group { position: relative; }

        .section-chip {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 11px 5px 12px; border-radius: 99px;
            font-size: 0.8rem; font-weight: 500; cursor: pointer;
            border: 1.5px solid var(--border); background: var(--bg);
            color: var(--text-secondary); transition: all 0.15s;
            white-space: nowrap; user-select: none;
        }
        .section-chip:hover { border-color: var(--primary); color: var(--primary); }
        .section-chip.all-on  { background: rgba(var(--primary-rgb), 0.10); border-color: var(--primary); color: var(--primary); }
        .section-chip.some-on { background: rgba(var(--primary-rgb), 0.05); border-color: var(--primary); color: var(--primary); opacity: 0.85; }

        .section-chip .chip-label { pointer-events: none; }
        .section-chip .chip-count {
            font-size: 0.68rem; font-weight: 600; padding: 1px 6px;
            border-radius: 99px; background: rgba(0,0,0,0.07);
            pointer-events: none;
        }
        .section-chip.all-on .chip-count, .section-chip.some-on .chip-count {
            background: rgba(var(--primary-rgb), 0.15);
        }
        .chip-chevron { width: 12px; height: 12px; opacity: 0.5; flex-shrink: 0; pointer-events: none; transition: transform 0.15s; }
        .section-group.open .chip-chevron { transform: rotate(180deg); }

        .section-dropdown {
            position: absolute; top: calc(100% + 6px); left: 0; z-index: 200;
            background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: 0 6px 20px rgba(0,0,0,0.13);
            padding: 5px; min-width: 195px;
            opacity: 0; pointer-events: none;
            transform: translateY(-4px);
            transition: opacity 0.13s, transform 0.13s;
        }
        .section-group.open .section-dropdown {
            opacity: 1; pointer-events: auto; transform: translateY(0);
        }

        /* Dropdown header: "Select all" toggle */
        .dropdown-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 5px 8px 6px; border-bottom: 1px solid var(--border); margin-bottom: 3px;
        }
        .dropdown-header-label { font-size: 0.72rem; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; }
        .dropdown-select-all { font-size: 0.72rem; color: var(--primary); cursor: pointer; font-weight: 500; border: none; background: none; padding: 0; }
        .dropdown-select-all:hover { text-decoration: underline; }

        .page-option {
            display: flex; align-items: center; gap: 8px; padding: 7px 8px;
            border-radius: calc(var(--radius) - 2px); cursor: pointer; font-size: 0.83rem;
            color: var(--text-primary); transition: background 0.1s; white-space: nowrap;
        }
        .page-option:hover { background: var(--bg-secondary); }
        .page-option input[type="checkbox"] { cursor: pointer; accent-color: var(--primary); width: 14px; height: 14px; flex-shrink: 0; }

        /* ── Action buttons ─────────────────────────────────────── */
        .admin-actions { display: flex; gap: 8px; align-items: center; }
        .save-btn { padding: 6px 14px; border-radius: var(--radius); border: none; background: var(--primary); color: white; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; }
        .save-btn:hover { opacity: 0.9; }
        .save-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .delete-btn { padding: 6px 10px; border-radius: var(--radius); border: 1px solid #FCA5A5; background: #FEF2F2; color: #DC2626; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
        .delete-btn:hover { background: #FEE2E2; }

        /* ── Status + misc ──────────────────────────────────────── */
        .status-msg { padding: 8px 16px; border-radius: var(--radius); margin-bottom: 16px; font-size: 0.875rem; display: none; }
        .status-msg.success { display: block; background: #DCFCE7; color: #16A34A; }
        .status-msg.error   { display: block; background: #FEE2E2; color: #DC2626; }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
        .loading     { text-align: center; padding: 48px 24px; color: var(--text-secondary); }

        @media (max-width: 768px) {
            .admin-table { display: block; overflow-x: auto; }
            .page-access-grid { max-width: 260px; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <div class="page-header-left">
                    <h1 class="page-title">Admin Panel</h1>
                    <p class="page-subtitle">Manage users, roles, and page access</p>
                </div>
            </div>

            <div id="status-msg" class="status-msg"></div>

            <!-- Add New User form -->
            <div class="card" style="padding: 16px; margin-bottom: 16px; overflow: visible;">
                <h3 style="font-size:0.8rem;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:12px;">Add New User</h3>
                <div style="display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;">
                    <div style="flex:1;min-width:180px;">
                        <label style="display:block;font-size:0.8rem;font-weight:600;margin-bottom:4px;color:var(--text-secondary);">Email</label>
                        <input type="email" id="invite-email" placeholder="user@example.com"
                            style="width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);font-size:0.875rem;font-family:inherit;">
                    </div>
                    <div style="flex:1;min-width:180px;">
                        <label style="display:block;font-size:0.8rem;font-weight:600;margin-bottom:4px;color:var(--text-secondary);">Temporary Password</label>
                        <input type="text" id="invite-password" placeholder="min 6 characters"
                            style="width:100%;padding:8px 10px;border-radius:var(--radius);border:1px solid var(--border);font-size:0.875rem;font-family:inherit;">
                    </div>
                    <button class="save-btn" id="invite-user-btn" style="height:36px;">Invite User</button>
                </div>
            </div>

            <div class="card" style="padding: 0; overflow: visible;">
                <div id="users-loading" class="loading">Loading users...</div>
                <div id="users-empty" class="empty-state" style="display:none;">No users found.</div>
                <table class="admin-table" id="users-table" style="display:none;">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Role</th>
                            <th>Page Access</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, isSuperAdmin, getAllUsers, updateUserRole, updateUserPages, deleteUserProfile, createUserWithEmail } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';

        const currentUser = await checkAuth();
        await renderSidebar();
        renderNavbar();
        initInactivityTimer();

        // Only super admins can access this page
        if (!(await isSuperAdmin())) {
            window.location.href = './dashboard.html';
            throw new Error('Not super admin');
        }

        /* ── Page sections (mirrors sidebar exactly) ──────────────────── */
        const SITE_SECTIONS = [
            {
                label: 'Analytics',
                pages: [
                    { slug: 'dashboard',          label: 'Dashboard' },
                    { slug: 'commission',          label: 'Commission' },
                    { slug: 'data-visualization',  label: 'Descending Revenue' },
                    { slug: 'hours-breakdown',     label: 'Hours Breakdown' },
                    { slug: 'profit-loss',         label: 'Profit & Loss' },
                ],
            },
            {
                label: 'Time Tracker',
                pages: [
                    { slug: 'timesheet-review',      label: 'Timesheet Review' },
                    { slug: 'time-tracker-settings', label: 'TT Settings' },
                ],
            },
            {
                label: 'Placement Tracker',
                pages: [
                    { slug: 'worker-assignments', label: 'Worker Assignments' },
                    { slug: 'scheduler',          label: 'Scheduler' },
                    { slug: 'tempworks',          label: 'TempWorks' },
                ],
            },
            {
                label: 'Reports',
                pages: [
                    { slug: 'reports', label: 'Reports' },
                ],
            },
            {
                label: 'Company Tracker',
                pages: [
                    { slug: 'roster-tracker', label: 'Company Tracker' },
                ],
            },
            {
                label: 'State Tax',
                pages: [
                    { slug: 'state-tax', label: 'State Tax' },
                ],
            },
            {
                label: 'Settings & Admin',
                pages: [
                    { slug: 'settings', label: 'Settings' },
                ],
            },
        ];

        /* ── Status helper ─────────────────────────────────────── */
        function showStatus(msg, type) {
            const el = document.getElementById('status-msg');
            el.textContent = msg;
            el.className = 'status-msg ' + type;
            setTimeout(() => { el.className = 'status-msg'; }, 4000);
        }

        /* ── Build section chip HTML ───────────────────────────── */
        function buildPageAccessHTML(allowedPages) {
            return SITE_SECTIONS.map((sec, si) => {
                const slugs    = sec.pages.map(p => p.slug);
                const onCount  = slugs.filter(s => allowedPages.includes(s)).length;
                const total    = slugs.length;
                const chipCls  = onCount === total ? 'all-on' : onCount > 0 ? 'some-on' : '';

                const pagesHTML = sec.pages.map(p => `
                    <label class="page-option">
                        <input type="checkbox" value="${p.slug}" ${allowedPages.includes(p.slug) ? 'checked' : ''}>
                        <span>${p.label}</span>
                    </label>`).join('');

                return `
                <div class="section-group" data-si="${si}">
                    <button type="button" class="section-chip ${chipCls}" data-si="${si}">
                        <span class="chip-label">${sec.label}</span>
                        <span class="chip-count">${onCount}/${total}</span>
                        <svg class="chip-chevron" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5"/></svg>
                    </button>
                    <div class="section-dropdown">
                        <div class="dropdown-header">
                            <span class="dropdown-header-label">${sec.label}</span>
                            <button type="button" class="dropdown-select-all" data-si="${si}">
                                ${onCount === total ? 'Deselect all' : 'Select all'}
                            </button>
                        </div>
                        ${pagesHTML}
                    </div>
                </div>`;
            }).join('');
        }

        /* ── Refresh chip state after checkbox changes ─────────── */
        function refreshChip(group) {
            const si      = group.dataset.si;
            const sec     = SITE_SECTIONS[si];
            const inputs  = group.querySelectorAll('.page-option input');
            const onCount = [...inputs].filter(i => i.checked).length;
            const total   = inputs.length;

            const chip  = group.querySelector('.section-chip');
            const count = group.querySelector('.chip-count');
            const selAll = group.querySelector('.dropdown-select-all');

            chip.classList.toggle('all-on',  onCount === total);
            chip.classList.toggle('some-on', onCount > 0 && onCount < total);
            count.textContent = `${onCount}/${total}`;
            if (selAll) selAll.textContent = onCount === total ? 'Deselect all' : 'Select all';
        }

        /* ── Attach dropdown / toggle listeners ────────────────── */
        function attachPageAccessListeners(container) {
            container.querySelectorAll('.section-group').forEach(group => {
                let closeTimer = null;

                function openDropdown()  { clearTimeout(closeTimer); group.classList.add('open'); }
                function scheduleClose() { closeTimer = setTimeout(() => group.classList.remove('open'), 120); }

                group.addEventListener('mouseenter', openDropdown);
                group.addEventListener('mouseleave', scheduleClose);

                // Chip click → toggle all pages in section
                group.querySelector('.section-chip').addEventListener('click', () => {
                    const inputs  = group.querySelectorAll('.page-option input');
                    const allOn   = [...inputs].every(i => i.checked);
                    inputs.forEach(i => i.checked = !allOn);
                    refreshChip(group);
                });

                // "Select all / Deselect all" inside dropdown
                group.querySelector('.dropdown-select-all')?.addEventListener('click', e => {
                    e.stopPropagation();
                    const inputs = group.querySelectorAll('.page-option input');
                    const allOn  = [...inputs].every(i => i.checked);
                    inputs.forEach(i => i.checked = !allOn);
                    refreshChip(group);
                });

                // Individual checkbox change
                group.querySelectorAll('.page-option input').forEach(input => {
                    input.addEventListener('change', () => refreshChip(group));
                });
            });

            // Close any open dropdown on outside click
            document.addEventListener('click', e => {
                if (!e.target.closest('.section-group')) {
                    container.querySelectorAll('.section-group.open').forEach(g => g.classList.remove('open'));
                }
            }, { capture: true });
        }

        /* ── Collect all checked slugs from a row ──────────────── */
        function getCheckedPages(row) {
            return [...row.querySelectorAll('.page-option input:checked')].map(i => i.value);
        }

        /* ── Render users table ────────────────────────────────── */
        function renderUsers(users) {
            const loading = document.getElementById('users-loading');
            const empty   = document.getElementById('users-empty');
            const table   = document.getElementById('users-table');
            const tbody   = document.getElementById('users-tbody');

            loading.style.display = 'none';

            if (!users.length) { empty.style.display = 'block'; return; }

            table.style.display = 'table';
            tbody.innerHTML = users.map(user => {
                const name         = user.username || user.email || 'Unknown';
                const initial      = name.charAt(0).toUpperCase();
                const allowedPages = user.allowed_pages || [];
                const isCurrentUser = user.id === currentUser.id;
                const isSuperAdmin  = user.role === 'super_admin';

                const pageAccessHTML = isSuperAdmin
                    ? '<span style="color:var(--text-secondary);font-size:0.82rem;font-style:italic;">All pages — super admin</span>'
                    : `<div class="page-access-grid" data-user-id="${user.id}">${buildPageAccessHTML(allowedPages)}</div>`;

                return `
                <tr data-user-id="${user.id}">
                    <td>
                        <div class="user-info">
                            <div class="user-avatar">${initial}</div>
                            <div>
                                <div>${name}${isCurrentUser ? ' <span style="color:var(--text-secondary);font-size:0.75rem;">(you)</span>' : ''}</div>
                                <div class="user-email">${user.email || ''}</div>
                            </div>
                        </div>
                    </td>
                    <td>
                        <select class="role-select" data-user-id="${user.id}" ${isCurrentUser ? 'disabled title="Cannot change your own role"' : ''}>
                            <option value="super_admin" ${user.role === 'super_admin' ? 'selected' : ''}>Super Admin</option>
                            <option value="admin"       ${user.role === 'admin'       ? 'selected' : ''}>Admin</option>
                            <option value="user"        ${user.role === 'user'        ? 'selected' : ''}>User</option>
                        </select>
                    </td>
                    <td>${pageAccessHTML}</td>
                    <td>
                        <div class="admin-actions">
                            <button class="save-btn" data-user-id="${user.id}" ${isCurrentUser ? 'disabled' : ''}>Save</button>
                            ${!isCurrentUser ? `<button class="delete-btn" data-user-id="${user.id}">Remove</button>` : ''}
                        </div>
                    </td>
                </tr>`;
            }).join('');

            // Attach dropdown listeners for each user row
            tbody.querySelectorAll('.page-access-grid').forEach(grid => {
                attachPageAccessListeners(grid);
            });

            // Role change → rebuild page access section
            tbody.querySelectorAll('.role-select').forEach(select => {
                select.addEventListener('change', () => {
                    const userId = select.dataset.userId;
                    const row    = tbody.querySelector(`tr[data-user-id="${userId}"]`);
                    const cell   = row.querySelector('td:nth-child(3)');
                    const user   = users.find(u => u.id === userId);
                    const allowed = user?.allowed_pages || [];

                    if (select.value === 'super_admin') {
                        cell.innerHTML = '<span style="color:var(--text-secondary);font-size:0.82rem;font-style:italic;">All pages — super admin</span>';
                    } else {
                        cell.innerHTML = `<div class="page-access-grid" data-user-id="${userId}">${buildPageAccessHTML(allowed)}</div>`;
                        attachPageAccessListeners(cell.querySelector('.page-access-grid'));
                    }
                });
            });

            // Save button
            tbody.querySelectorAll('.save-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const userId = btn.dataset.userId;
                    btn.disabled = true;
                    btn.textContent = 'Saving…';
                    try {
                        const row  = btn.closest('tr');
                        const role = row.querySelector('.role-select').value;
                        await updateUserRole(userId, role);

                        if (role !== 'super_admin') {
                            const pages = getCheckedPages(row);
                            await updateUserPages(userId, pages);
                        }

                        showStatus('User updated successfully.', 'success');

                        // Update local user cache
                        const user = users.find(u => u.id === userId);
                        if (user) {
                            user.role = role;
                            if (role !== 'super_admin') user.allowed_pages = getCheckedPages(row);
                        }
                    } catch (err) {
                        showStatus('Failed to update user: ' + err.message, 'error');
                    }
                    btn.disabled = false;
                    btn.textContent = 'Save';
                });
            });

            // Delete button
            tbody.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const userId = btn.dataset.userId;
                    const user   = users.find(u => u.id === userId);
                    if (!confirm(`Remove ${user?.username || user?.email || 'this user'}? This removes their profile but not their auth account.`)) return;
                    try {
                        await deleteUserProfile(userId);
                        showStatus('User profile removed.', 'success');
                        users = users.filter(u => u.id !== userId);
                        renderUsers(users);
                    } catch (err) {
                        showStatus('Failed to remove user: ' + err.message, 'error');
                    }
                });
            });
        }

        // Invite user handler
        document.getElementById('invite-user-btn').addEventListener('click', async () => {
            const emailInput = document.getElementById('invite-email');
            const passInput  = document.getElementById('invite-password');
            const email    = emailInput.value.trim();
            const password = passInput.value.trim();
            if (!email || !password) { showStatus('Please enter email and password.', 'error'); return; }
            if (password.length < 6) { showStatus('Password must be at least 6 characters.', 'error'); return; }
            const btn = document.getElementById('invite-user-btn');
            btn.disabled = true; btn.textContent = 'Inviting…';
            try {
                await createUserWithEmail(email, password);
                showStatus(`User ${email} invited successfully.`, 'success');
                emailInput.value = ''; passInput.value = '';
                setTimeout(async () => {
                    try { let users = await getAllUsers(); renderUsers(users); } catch (e) {}
                }, 2000);
            } catch (err) {
                showStatus('Failed: ' + err.message, 'error');
            }
            btn.disabled = false; btn.textContent = 'Invite User';
        });

        // Load users
        try {
            let users = await getAllUsers();
            renderUsers(users);
        } catch (err) {
            document.getElementById('users-loading').textContent = 'Error loading users: ' + err.message;
        }
    </script>
</body>
</html>
