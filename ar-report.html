<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/R Report – TalentLedger</title>
  <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
  <link rel="stylesheet" href="./src/design-system.css">
  <style>
    /* ── Toolbar ─────────────────────────────────────────────── */
    .ar-toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 0 0 16px;
    }
    .toolbar-spacer { flex: 1; }
    .btn-sync {
      padding: 8px 16px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-sync:hover    { opacity: .9; }
    .btn-sync:disabled { opacity: .5; cursor: not-allowed; }
    .sync-meta { font-size: .78rem; color: var(--text-secondary); }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner-wrap { text-align: center; padding: 60px; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #E5E7EB;
               border-top-color: var(--primary); border-radius: 50%;
               animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Region & branch headers ─────────────────────────────── */
    .region-block  { margin-bottom: 32px; }
    .region-header {
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-secondary);
      padding: 6px 0 8px; margin-bottom: 12px;
      border-bottom: 2px solid var(--border);
    }
    .branch-block  { margin-bottom: 20px; }
    .branch-header {
      font-size: .82rem; font-weight: 700; color: #1E3A5F;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      border-radius: 6px 6px 0 0; padding: 8px 14px;
    }

    /* ── Invoice table ───────────────────────────────────────── */
    .inv-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .inv-table th {
      padding: 6px 12px; text-align: right;
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: #6B7280;
      background: #F9FAFB; border: 1px solid #E5E7EB; white-space: nowrap;
    }
    .inv-table th.left { text-align: left; }
    .inv-table td {
      padding: 7px 12px; border: 1px solid #F3F4F6;
      text-align: right; color: #111827; white-space: nowrap;
      vertical-align: middle;
    }
    .inv-table td.left  { text-align: left; font-weight: 500; }
    .inv-table td.muted { color: #6B7280; font-size: .76rem; }
    .inv-table tr:hover td { background: #FAFAFA; }

    /* Branch totals row */
    .inv-table tr.totals td {
      font-weight: 700; background: #F1F5F9;
      border-top: 2px solid #CBD5E1; color: #1E3A5F;
    }
    .inv-table tr.totals td.left {
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .04em; color: #6B7280;
    }

    /* Past due highlight */
    .inv-table tr.is-past-due td { background: #FEF2F2; }
    .inv-table tr.is-past-due:hover td { background: #FEE2E2; }

    /* ── Unassigned banner ───────────────────────────────────── */
    .unassigned-banner {
      background: #FEF9C3; border: 1px solid #FDE047; border-radius: 8px;
      padding: 10px 16px; margin-bottom: 16px; font-size: .82rem; color: #854D0E;
    }
    .assign-select {
      padding: 3px 8px; border-radius: 5px; border: 1px solid #FDE047;
      background: #fff; font-size: .78rem; margin: 0 6px;
    }
    .assign-btn {
      padding: 3px 10px; background: #D97706; color: #fff;
      border: none; border-radius: 5px; font-size: .72rem; font-weight: 700; cursor: pointer;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
    .empty-state .icon  { font-size: 2.4rem; margin-bottom: 10px; }
    .empty-state .label { font-size: .95rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }

    /* ── Print ───────────────────────────────────────────────── */
    @media print {
      .sidebar, .navbar, .ar-toolbar, .unassigned-banner { display: none !important; }
      .inv-table { font-size: .7rem; }
      .branch-block { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="page-content">

      <div class="page-header">
        <div>
          <h1 class="page-title">A/R Report</h1>
          <p class="page-subtitle" id="report-subtitle">Invoice Register from PSA</p>
        </div>
      </div>

      <div class="ar-toolbar">
        <span class="sync-meta" id="sync-meta"></span>
        <div class="toolbar-spacer"></div>
        <button class="btn-sync" id="btn-sync" onclick="syncFromPSA()">⟳ Sync from PSA</button>
      </div>

      <div id="report-content">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { renderNavbar }  from './src/components/navbar.js';
  import { renderSidebar } from './src/components/sidebar.js';
  import { checkAuth, checkPageAccess } from './src/auth.js';
  import { supabase } from './src/supabaseClient.js';
  import { initInactivityTimer } from './src/main.js';

  await checkAuth();
  await checkPageAccess('ar-report');
  renderNavbar();
  await renderSidebar();
  initInactivityTimer();

  // ── State ──────────────────────────────────────────────────────
  let regionMap  = {};   // branchname → region
  let allRegions = [];
  let lastData   = [];

  // ── Load region map ────────────────────────────────────────────
  async function loadRegionMap() {
    const { data } = await supabase.from('ar_region_map').select('branch_name, region');
    regionMap  = {};
    for (const r of (data || [])) regionMap[r.branch_name] = r.region;
    allRegions = [...new Set(Object.values(regionMap))].sort();
  }

  // ── Formatting ─────────────────────────────────────────────────
  function fmt$(n) {
    return (n ?? 0).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('T')[0].split('-');
    return `${parseInt(m)}/${parseInt(d)}/${y}`;
  }

  // ── Render ─────────────────────────────────────────────────────
  function render(invoices) {
    lastData = invoices;
    if (!invoices.length) {
      document.getElementById('report-content').innerHTML =
        `<div class="empty-state"><div class="icon">📭</div>
         <div class="label">No open invoices returned from PSA</div></div>`;
      return;
    }

    // Group: region → branch → invoices
    const grouped    = {};
    const unassigned = [];

    for (const inv of invoices) {
      const region = regionMap[inv.branchname];
      if (!region) { unassigned.push(inv); continue; }
      if (!grouped[region])              grouped[region] = {};
      if (!grouped[region][inv.branchname]) grouped[region][inv.branchname] = [];
      grouped[region][inv.branchname].push(inv);
    }

    let html = '';

    // Unassigned banner
    if (unassigned.length) {
      const branches = [...new Set(unassigned.map(i => i.branchname))].sort();
      html += `<div class="unassigned-banner">
        ⚠️ <strong>${branches.length} branch(es) not yet assigned to a region:</strong>
        ${branches.map(b => `
          <span style="margin-left:12px;">
            <strong>${esc(b)}</strong> →
            <select class="assign-select" id="asel-${esc(b)}">
              <option value="">Select region…</option>
              ${allRegions.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join('')}
              <option value="__new__">+ New region…</option>
            </select>
            <button class="assign-btn" onclick="assignRegion('${esc(b)}')">Assign</button>
          </span>`).join('')}
      </div>`;
    }

    // Regions
    for (const region of Object.keys(grouped).sort()) {
      html += `<div class="region-block">
        <div class="region-header">Region: ${esc(region)}</div>`;

      for (const branch of Object.keys(grouped[region]).sort()) {
        const rows    = grouped[region][branch];
        let totAmount = 0, totPaid = 0, totBalance = 0;

        const rowsHTML = rows.map(inv => {
          const balance = Math.max(0, (inv.invoiceamount || 0) - (inv.payamount || 0));
          totAmount  += inv.invoiceamount || 0;
          totPaid    += inv.payamount     || 0;
          totBalance += balance;

          const pastDue = (inv.pastdue || 0) > 0;
          return `<tr${pastDue ? ' class="is-past-due"' : ''}>
            <td class="left">${esc(inv.customername || '')}</td>
            <td class="muted">${fmtDate(inv.weekendbill)}</td>
            <td class="muted">${fmtDate(inv.duedate)}</td>
            <td class="muted">${esc(String(inv.invoicenumber || ''))}</td>
            <td>${fmt$(inv.invoiceamount)}</td>
            <td>${fmt$(inv.payamount)}</td>
            <td style="${balance > 0 ? 'font-weight:600;' : 'color:#9CA3AF;'}">${fmt$(balance)}</td>
            <td class="muted">${inv.dso ?? '—'}</td>
            <td style="${pastDue ? 'color:#DC2626;font-weight:600;' : 'color:#9CA3AF;'}">${inv.pastdue ?? '—'}</td>
          </tr>`;
        }).join('');

        html += `<div class="branch-block">
          <div class="branch-header">Branch: ${esc(branch)}</div>
          <table class="inv-table">
            <thead><tr>
              <th class="left">Customer</th>
              <th>Invoice Date</th>
              <th>Due Date</th>
              <th>Invoice #</th>
              <th>Amount</th>
              <th>Paid</th>
              <th>Balance</th>
              <th>DSO</th>
              <th>Past Due</th>
            </tr></thead>
            <tbody>
              ${rowsHTML}
              <tr class="totals">
                <td class="left">Branch Totals — ${rows.length} invoice${rows.length !== 1 ? 's' : ''}</td>
                <td></td><td></td><td></td>
                <td>${fmt$(totAmount)}</td>
                <td>${fmt$(totPaid)}</td>
                <td>${fmt$(totBalance)}</td>
                <td></td><td></td>
              </tr>
            </tbody>
          </table>
        </div>`;
      }

      html += `</div>`; // end region-block
    }

    document.getElementById('report-content').innerHTML = html;
  }

  // ── Sync from PSA ──────────────────────────────────────────────
  window.syncFromPSA = async function() {
    const btn = document.getElementById('btn-sync');
    btn.textContent = '⟳ Syncing…';
    btn.disabled = true;
    document.getElementById('report-content').innerHTML =
      '<div class="spinner-wrap"><div class="spinner"></div></div>';
    document.getElementById('sync-meta').textContent = '';

    try {
      const today     = new Date();
      const startDate = new Date(today);
      startDate.setFullYear(startDate.getFullYear() - 1);
      const fmt = d => d.toISOString().slice(0, 10);

      const res = await fetch(
        `/api/psa?endpoint=/api/invoice_register/query&start_date=${fmt(startDate)}&end_date=${fmt(today)}`
      );
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error || `PSA API ${res.status}`);
      }

      const raw = await res.json();
      if (!Array.isArray(raw)) throw new Error('Unexpected response format from PSA');

      // Keep only invoices with an outstanding balance
      const open = raw.filter(r => ((r.invoiceamount || 0) - (r.payamount || 0)) > 0.005);

      await loadRegionMap();
      render(open);

      const ts = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      document.getElementById('sync-meta').textContent =
        `${open.length} open invoices · synced at ${ts}`;
    } catch (err) {
      document.getElementById('report-content').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div>
         <div class="label" style="color:#DC2626;">Sync failed</div>
         <div>${esc(err.message)}</div></div>`;
    } finally {
      btn.textContent = '⟳ Sync from PSA';
      btn.disabled = false;
    }
  };

  // ── Assign region ──────────────────────────────────────────────
  window.assignRegion = async function(branch) {
    const sel = document.getElementById('asel-' + branch);
    let region = sel?.value;
    if (!region) { alert('Please select a region.'); return; }
    if (region === '__new__') {
      region = prompt('Enter new region name:')?.trim();
      if (!region) return;
    }
    const { error } = await supabase.from('ar_region_map')
      .upsert({ branch_name: branch, region }, { onConflict: 'branch_name' });
    if (error) { alert('Error: ' + error.message); return; }
    regionMap[branch] = region;
    if (!allRegions.includes(region)) { allRegions.push(region); allRegions.sort(); }
    render(lastData);
  };

  // ── Utility ────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Init ───────────────────────────────────────────────────────
  await loadRegionMap();
  await syncFromPSA();
</script>
</body>
</html>
