<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A/R Report – TalentLedger</title>
  <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
  <link rel="stylesheet" href="./src/design-system.css">
  <style>
    /* ── Toolbar ─────────────────────────────────────────────── */
    .ar-toolbar {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      padding: 0 0 16px;
    }
    .toolbar-spacer { flex: 1; }
    .date-label { font-size: .8rem; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
    .date-input {
      padding: 6px 10px; border: 1px solid #D1D5DB; border-radius: 7px;
      font-size: .82rem; font-family: inherit; color: #111827;
      background: #fff; cursor: pointer;
    }
    .date-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(234,137,56,.15); }
    .btn-sync {
      padding: 8px 16px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: .82rem; font-weight: 700;
      cursor: pointer; transition: opacity .15s;
    }
    .btn-sync:hover    { opacity: .9; }
    .btn-sync:disabled { opacity: .5; cursor: not-allowed; }
    .sync-meta { font-size: .78rem; color: var(--text-secondary); }

    /* ── Spinner ─────────────────────────────────────────────── */
    .spinner-wrap { text-align: center; padding: 60px; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #E5E7EB;
               border-top-color: var(--primary); border-radius: 50%;
               animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Region & branch headers ─────────────────────────────── */
    .region-block  { margin-bottom: 32px; }
    .region-header {
      display: flex; align-items: center; gap: 8px;
      font-size: .72rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .08em; color: var(--text-secondary);
      padding: 6px 0 8px; margin-bottom: 12px;
      border-bottom: 2px solid var(--border);
      cursor: pointer; user-select: none;
    }
    .region-header:hover { color: var(--text-primary); }
    .region-chevron {
      display: inline-block; width: 14px; height: 14px; flex-shrink: 0;
      transition: transform .2s;
    }
    .region-block.collapsed .region-chevron { transform: rotate(-90deg); }
    .region-body { overflow: hidden; }
    .region-block.collapsed .region-body { display: none; }
    .branch-block  { margin-bottom: 20px; }
    .branch-header {
      font-size: .82rem; font-weight: 700; color: #1E3A5F;
      background: #EFF6FF; border: 1px solid #BFDBFE;
      border-radius: 6px 6px 0 0; padding: 8px 14px;
    }

    /* ── Invoice table ───────────────────────────────────────── */
    .inv-table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    .inv-table th {
      padding: 6px 12px; text-align: right;
      font-size: .68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: #6B7280;
      background: #F9FAFB; border: 1px solid #E5E7EB; white-space: nowrap;
    }
    .inv-table th.left { text-align: left; }
    .inv-table td {
      padding: 7px 12px; border: 1px solid #F3F4F6;
      text-align: right; color: #111827; white-space: nowrap;
      vertical-align: middle;
    }
    .inv-table td.left  { text-align: left; font-weight: 500; }
    .inv-table td.muted { color: #6B7280; font-size: .76rem; }
    .inv-table tr:hover td { background: #FAFAFA; }

    /* Branch totals row */
    .inv-table tr.totals td {
      font-weight: 700; background: #F1F5F9;
      border-top: 2px solid #CBD5E1; color: #1E3A5F;
    }
    .inv-table tr.totals td.left {
      font-size: .72rem; text-transform: uppercase;
      letter-spacing: .04em; color: #6B7280;
    }

    /* Past due highlight */
    .inv-table tr.is-past-due td { background: #FEF2F2; }
    .inv-table tr.is-past-due:hover td { background: #FEE2E2; }

    /* ── Unassigned banner ───────────────────────────────────── */
    .unassigned-banner {
      background: #FEF9C3; border: 1px solid #FDE047; border-radius: 8px;
      padding: 10px 16px; margin-bottom: 16px; font-size: .82rem; color: #854D0E;
    }
    /* ── Empty state ─────────────────────────────────────────── */
    .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }
    .empty-state .icon  { font-size: 2.4rem; margin-bottom: 10px; }
    .empty-state .label { font-size: .95rem; font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }

    /* ── Print ───────────────────────────────────────────────── */
    @media print {
      .sidebar, .navbar, .ar-toolbar, .unassigned-banner { display: none !important; }
      .inv-table { font-size: .7rem; }
      .branch-block { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main-content">
    <div class="page-content">

      <div class="page-header">
        <div>
          <h1 class="page-title">A/R Report</h1>
          <p class="page-subtitle" id="report-subtitle">Invoice Register from PSA</p>
        </div>
      </div>

      <div class="ar-toolbar">
        <label class="date-label" for="date-from">From</label>
        <input type="date" class="date-input" id="date-from">
        <label class="date-label" for="date-to">To</label>
        <input type="date" class="date-input" id="date-to">
        <div class="toolbar-spacer"></div>
        <span class="sync-meta" id="sync-meta"></span>
        <button class="btn-sync" id="btn-sync" onclick="syncFromPSA()">⟳ Sync from PSA</button>
      </div>

      <div id="report-content">
        <div class="spinner-wrap"><div class="spinner"></div></div>
      </div>

    </div>
  </div>
</div>

<script type="module">
  import { renderNavbar }  from './src/components/navbar.js';
  import { renderSidebar } from './src/components/sidebar.js';
  import { checkAuth, checkPageAccess } from './src/auth.js';
  import { supabase } from './src/supabaseClient.js';
  import { initInactivityTimer } from './src/main.js';

  await checkAuth();
  await checkPageAccess('ar-report');
  renderNavbar();
  await renderSidebar();
  initInactivityTimer();

  // ── State ──────────────────────────────────────────────────────
  let regionMap = {};   // branch → region  (from branch_settings)
  let lastData  = [];

  // ── Load region map from branch_settings ──────────────────────
  async function loadRegionMap() {
    const { data } = await supabase.from('branch_settings').select('branch, region');
    regionMap = {};
    for (const r of (data || [])) {
      if (r.branch && r.region) regionMap[r.branch] = r.region;
    }
  }

  // ── Formatting ─────────────────────────────────────────────────
  function fmt$(n) {
    return (n ?? 0).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
  }

  function fmtDate(iso) {
    if (!iso) return '—';
    const [y, m, d] = iso.split('T')[0].split('-');
    return `${parseInt(m)}/${parseInt(d)}/${y}`;
  }

  // ── Render ─────────────────────────────────────────────────────
  function render(invoices) {
    lastData = invoices;
    if (!invoices.length) {
      document.getElementById('report-content').innerHTML =
        `<div class="empty-state"><div class="icon">📭</div>
         <div class="label">No invoices returned from PSA</div></div>`;
      return;
    }

    // Group: region → branch → invoices
    const grouped    = {};
    const unassigned = [];

    for (const inv of invoices) {
      const region = regionMap[inv.branch];
      if (!region) { unassigned.push(inv); continue; }
      if (!grouped[region])               grouped[region] = {};
      if (!grouped[region][inv.branch])   grouped[region][inv.branch] = [];
      grouped[region][inv.branch].push(inv);
    }

    let html = '';

    // Unassigned banner
    if (unassigned.length) {
      const branches = [...new Set(unassigned.map(i => i.branch))].filter(Boolean).sort();
      html += `<div class="unassigned-banner">
        ⚠️ <strong>${branches.length} branch(es) have no region assigned:</strong>
        ${branches.map(b => `<strong style="margin-left:8px;">${esc(b)}</strong>`).join(',')}
        &nbsp;— <a href="./settings.html" style="color:#854D0E;font-weight:700;text-decoration:underline;">Go to Settings → Branch</a> to assign regions.
      </div>`;
    }

    // Regions
    const chevronSVG = `<svg class="region-chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>`;

    for (const region of Object.keys(grouped).sort()) {
      let branchesHTML = '';

      for (const branch of Object.keys(grouped[region]).sort()) {
        const rows   = grouped[region][branch];
        let totAmount = 0;

        const rowsHTML = rows.map(inv => {
          totAmount += inv.amount || 0;
          return `<tr>
            <td class="left">${esc(inv.customer || '')}</td>
            <td class="muted">${fmtDate(inv.weekend_bill)}</td>
            <td style="font-weight:600;">${fmt$(inv.amount)}</td>
          </tr>`;
        }).join('');

        branchesHTML += `<div class="branch-block">
          <div class="branch-header">Branch: ${esc(branch)}</div>
          <table class="inv-table">
            <thead><tr>
              <th class="left">Customer</th>
              <th>Invoice Date</th>
              <th>Amount</th>
            </tr></thead>
            <tbody>
              ${rowsHTML}
              <tr class="totals">
                <td class="left">Branch Totals — ${rows.length} record${rows.length !== 1 ? 's' : ''}</td>
                <td></td>
                <td>${fmt$(totAmount)}</td>
              </tr>
            </tbody>
          </table>
        </div>`;
      }

      html += `<div class="region-block">
        <div class="region-header" onclick="this.closest('.region-block').classList.toggle('collapsed')">
          ${chevronSVG}Region: ${esc(region)}
        </div>
        <div class="region-body">${branchesHTML}</div>
      </div>`;
    }

    document.getElementById('report-content').innerHTML = html;
  }

  // ── Sync from PSA ──────────────────────────────────────────────
  window.syncFromPSA = async function() {
    const startVal = document.getElementById('date-from').value;
    const endVal   = document.getElementById('date-to').value;
    if (!startVal || !endVal) { alert('Please select a date range.'); return; }
    if (startVal > endVal)    { alert('Start date must be before end date.'); return; }

    const btn = document.getElementById('btn-sync');
    btn.textContent = '⟳ Syncing…';
    btn.disabled = true;
    document.getElementById('report-content').innerHTML =
      '<div class="spinner-wrap"><div class="spinner"></div></div>';
    document.getElementById('sync-meta').textContent = '';

    try {
      const res = await fetch(
        `/api/psa?endpoint=/api/invoice_register/query&start_date=${startVal}&end_date=${endVal}`
      );
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error || `PSA API ${res.status}`);
      }

      const raw = await res.json();
      if (!Array.isArray(raw)) throw new Error('Unexpected response format from PSA');

      await loadRegionMap();
      render(raw);

      const ts = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      document.getElementById('sync-meta').textContent =
        `${raw.length} records · synced at ${ts}`;
    } catch (err) {
      document.getElementById('report-content').innerHTML =
        `<div class="empty-state"><div class="icon">⚠️</div>
         <div class="label" style="color:#DC2626;">Sync failed</div>
         <div>${esc(err.message)}</div></div>`;
    } finally {
      btn.textContent = '⟳ Sync from PSA';
      btn.disabled = false;
    }
  };

  // ── Utility ────────────────────────────────────────────────────
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  // ── Init — seed date pickers then auto-sync ────────────────────
  (function seedDates() {
    const today = new Date();
    const firstOfLastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
    const toISO = d => d.toISOString().slice(0, 10);
    document.getElementById('date-from').value = toISO(firstOfLastMonth);
    document.getElementById('date-to').value   = toISO(today);
  })();

  await loadRegionMap();
  await syncFromPSA();
</script>
</body>
</html>
