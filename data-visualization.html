<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Data Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .viz-layout { display: grid; grid-template-columns: 38% 1fr; grid-template-rows: auto auto 1fr; gap: 16px; }
        .viz-filters { grid-row: 1; grid-column: 1 / 3; }
        .viz-total-bar { grid-row: 2; grid-column: 1 / 3; }
        .viz-table-section { grid-row: 3; grid-column: 1; }
        .viz-chart-section { grid-row: 3; grid-column: 2; }
        .filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .filter-row + .filter-row { margin-top: 8px; }
        .filter-row .form-select, .filter-row .form-input { min-width: 120px; }
        .filter-row label { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .table-scroll { overflow-y: auto; max-height: calc(100vh - 420px); }
        .total-bar { background-color: var(--primary); color: #fff; padding: 8px 12px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 15px; }
        .chart-wrap { position: relative; min-height: 350px; padding: 12px; flex: 1; }
        .chart-wrap canvas { max-height: 500px; }
        .loading-indicator { text-align: center; padding: 40px; color: var(--text-secondary); }
        .btn-icon { background: none; border: 1px solid var(--border-color); border-radius: 6px; padding: 6px 10px; cursor: pointer; display: flex; align-items: center; transition: background-color 0.2s; }
        .btn-icon:hover { background-color: var(--bg-default); }
        @media (max-width: 900px) { .viz-layout { grid-template-columns: 1fr; } .viz-chart-section, .viz-table-section { grid-column: 1; } }
        @media print {
            body { background: #fff !important; }
            .sidebar, .topbar, .viz-filters { display: none !important; }
            .main-content { margin: 0 !important; padding: 10px !important; }
            .viz-layout { display: block !important; }
            .card { box-shadow: none !important; border: 1px solid #ccc !important; margin-bottom: 16px; }
            .data-table th, .data-table td { border: 1px solid #000 !important; color: #000 !important; }
            .data-table th { background: #ddd !important; }
            .print-header { display: block !important; font-size: 20px; text-align: center; font-weight: 700; padding: 10px 0; }
        }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Data Visualization</h1>
                <p class="page-subtitle">Revenue and performance analytics</p>
            </div>
            <div class="print-header" style="display:none;" id="print-header"></div>
            <div class="viz-layout">
                <div class="viz-filters">
                    <div class="card" style="padding:12px;">
                        <div class="filter-row">
                            <select class="form-select" id="report_type" style="min-width:200px;">
                                <option value="DRR" selected>DRR - Descending Revenue</option>
                                <option value="GSR">GSR - General Staffing</option>
                                <option value="DHR">DHR - Direct Hire</option>
                                <option value="PLR">PLR - Profit & Loss</option>
                            </select>
                            <select class="form-select" id="branch_filter">
                                <option value="all" selected>All Branches</option>
                            </select>
                            <input class="form-input" type="date" id="start_date" style="max-width:150px;">
                            <input class="form-input" type="date" id="end_date" style="max-width:150px;">
                            <input class="form-input" type="text" id="company_search" placeholder="Search company..." style="max-width:180px;">
                            <button class="btn btn-primary" type="button" id="apply-btn" style="padding:6px 16px;">Apply</button>
                        </div>
                        <div class="filter-row">
                            <label><input type="checkbox" id="dhp_filter"> DHP</label>
                            <label><input type="checkbox" id="gsp_filter"> GSP</label>
                            <select class="form-select" id="interval_select" style="max-width:120px;">
                                <option value="weekly" selected>Weekly</option>
                                <option value="monthly">Monthly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                            <select class="form-select" id="graph_type" style="max-width:100px;">
                                <option value="bar" selected>Bar</option>
                                <option value="line">Line</option>
                                <option value="pie">Pie</option>
                            </select>
                            <label><input type="checkbox" id="forecast_check"> Forecast</label>
                            <input class="form-input" type="date" id="forecast_end" style="max-width:150px;display:none;">
                            <button class="btn-icon" type="button" id="print-btn" title="Print" style="margin-left:auto;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="viz-total-bar">
                    <div class="total-bar" id="total-bar">Total: $0</div>
                </div>
                <div class="viz-table-section">
                    <div class="card" style="padding:0;overflow:hidden;">
                        <div class="table-scroll">
                            <table class="data-table" id="data-table">
                                <thead><tr id="table-header"></tr></thead>
                                <tbody id="data-table-body">
                                    <tr><td colspan="4" class="loading-indicator">Loading data...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="viz-chart-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="chart-wrap">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, checkPageAccess } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';
        import {
            fetchInvoiceRegister, fetchTotalHoursByBranch, fetchTotalBillingByBranch,
            fetchTotalHoursByCompany, fetchTotalBillingByCompany,
            formatCurrency, formatCurrency2, formatNumber, getDefaultStartDate, getDefaultEndDate
        } from './src/apiClient.js';

        await checkAuth();
        await checkPageAccess('data-visualization');
        renderNavbar();
        await renderSidebar();
        initInactivityTimer();

        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#6B7280';

        // ── State ─────────────────────────────────────────────────
        let rawInvoices = [];
        let rawBillingByBranch = [];
        let rawHoursByCompany = [];
        let rawBillingByCompany = [];
        let mainChart = null;

        // ── Init ──────────────────────────────────────────────────
        document.getElementById('start_date').value = getDefaultStartDate();
        document.getElementById('end_date').value = getDefaultEndDate();
        // Default forecast end: 3 months from now
        const fEnd = new Date(); fEnd.setMonth(fEnd.getMonth() + 3);
        document.getElementById('forecast_end').value = fEnd.toISOString().split('T')[0];

        // ── Fetch Data ────────────────────────────────────────────
        async function loadData() {
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            if (!startDate || !endDate) return;

            document.getElementById('data-table-body').innerHTML = '<tr><td colspan="6" class="loading-indicator">Loading data...</td></tr>';

            try {
                const [invoices, billingBranch, hoursCo, billingCo] = await Promise.all([
                    fetchInvoiceRegister(startDate, endDate),
                    fetchTotalBillingByBranch(startDate, endDate),
                    fetchTotalHoursByCompany(startDate, endDate),
                    fetchTotalBillingByCompany(startDate, endDate),
                ]);

                rawInvoices = invoices;
                rawBillingByBranch = billingBranch;
                rawHoursByCompany = hoursCo;
                rawBillingByCompany = billingCo;

                populateBranchFilter();
                processData();
            } catch (err) {
                document.getElementById('data-table-body').innerHTML = `<tr><td colspan="6" class="loading-indicator" style="color:#DC2626">Error: ${err.message}</td></tr>`;
            }
        }

        function populateBranchFilter() {
            const branchSet = new Set();
            rawInvoices.forEach(r => { if (r.branchname) branchSet.add(r.branchname); });
            rawBillingByBranch.forEach(r => { if (r.branch) branchSet.add(r.branch); });
            const sel = document.getElementById('branch_filter');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">All Branches</option>';
            [...branchSet].sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                if (b === cur) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        // ── Process Data Based on Report Type ─────────────────────
        function processData() {
            const report = document.getElementById('report_type').value;
            const branch = document.getElementById('branch_filter').value;
            const search = (document.getElementById('company_search').value || '').toLowerCase();
            const dhpOn = document.getElementById('dhp_filter').checked;
            const gspOn = document.getElementById('gsp_filter').checked;

            if (report === 'PLR') {
                processPLR(branch, search, dhpOn, gspOn);
            } else {
                processCompanyReport(report, branch, search, dhpOn, gspOn);
            }
        }

        // ── DRR / GSR / DHR ───────────────────────────────────────
        function processCompanyReport(report, branch, search, dhpOn, gspOn) {
            let filtered = rawInvoices.filter(r => {
                if (branch !== 'all' && r.branchname !== branch) return false;
                const isDHP = (r.customername || '').toUpperCase().includes('DHP');
                if (report === 'DHR' && !isDHP) return false;
                if (report === 'GSR' && isDHP) return false;
                if (dhpOn && !isDHP) return false;
                if (gspOn && isDHP) return false;
                if (search && !(r.customername || '').toLowerCase().includes(search)) return false;
                return true;
            });

            // Table: aggregate by company
            const companyAgg = {};
            filtered.forEach(r => {
                const key = r.customername || 'Unknown';
                if (!companyAgg[key]) companyAgg[key] = { company: key, branch: r.branchname || '', revenue: 0, branches: new Set() };
                companyAgg[key].revenue += Number(r.invoiceamount) || 0;
                if (r.branchname) companyAgg[key].branches.add(r.branchname);
            });

            // Merge hours data for DHR/GSR
            if (report === 'DHR' || report === 'GSR') {
                rawHoursByCompany.forEach(r => {
                    const isDHP = (r.company_name || '').toUpperCase().includes('DHP');
                    if (report === 'DHR' && !isDHP) return;
                    if (report === 'GSR' && isDHP) return;
                    if (branch !== 'all' && r.branch !== branch) return;
                    if (search && !(r.company_name || '').toLowerCase().includes(search)) return;
                    const key = r.company_name || 'Unknown';
                    if (!companyAgg[key]) companyAgg[key] = { company: key, branch: r.branch || '', revenue: 0, branches: new Set() };
                    companyAgg[key].hours = (companyAgg[key].hours || 0) + (Number(r.total_hours) || 0);
                    if (r.branch) companyAgg[key].branches.add(r.branch);
                });
            }

            const tableData = Object.values(companyAgg).map(c => ({
                ...c, branch: [...c.branches].join(', ')
            })).sort((a, b) => b.revenue - a.revenue);

            // Time-series: aggregate by interval
            const interval = document.getElementById('interval_select').value;
            const timeAgg = {};
            filtered.forEach(r => {
                const weekend = r.weekendbill || '';
                if (!weekend) return;
                let key;
                if (interval === 'weekly') key = weekend;
                else if (interval === 'monthly') key = weekend.substring(0, 7);
                else key = weekend.substring(0, 4);
                timeAgg[key] = (timeAgg[key] || 0) + (Number(r.invoiceamount) || 0);
            });

            const timeSeries = Object.entries(timeAgg).sort((a, b) => a[0].localeCompare(b[0]));
            const total = tableData.reduce((s, r) => s + r.revenue, 0);

            // Render
            const reportLabels = { DRR: 'Descending Revenue', GSR: 'General Staffing', DHR: 'Direct Hire' };
            document.getElementById('total-bar').textContent = `Total ${reportLabels[report]}: ${formatCurrency(total)}`;
            document.getElementById('print-header').textContent = `${reportLabels[report]} Report`;

            renderCompanyTable(report, tableData);
            renderTimeChart(timeSeries, reportLabels[report]);
        }

        // ── PLR ───────────────────────────────────────────────────
        function processPLR(branch, search, dhpOn, gspOn) {
            const grossPayMap = {};
            rawBillingByBranch.forEach(r => {
                const b = r.branch || 'Unknown';
                grossPayMap[b] = (grossPayMap[b] || 0) + (Number(r.total_billing) || 0);
            });

            const branchAgg = {};
            const timeAgg = {};
            rawInvoices.forEach(r => {
                const b = r.branchname || 'Unknown';
                const isDHP = (r.customername || '').toUpperCase().includes('DHP');
                const amount = Number(r.invoiceamount) || 0;
                if (branch !== 'all' && b !== branch) return;
                if (dhpOn && !isDHP) return;
                if (gspOn && isDHP) return;
                if (search && !(r.customername || '').toLowerCase().includes(search)) return;

                if (!branchAgg[b]) branchAgg[b] = { branch: b, revenue: 0 };
                branchAgg[b].revenue += amount;

                const weekend = r.weekendbill || '';
                if (weekend) {
                    const interval = document.getElementById('interval_select').value;
                    let key;
                    if (interval === 'weekly') key = weekend;
                    else if (interval === 'monthly') key = weekend.substring(0, 7);
                    else key = weekend.substring(0, 4);
                    timeAgg[key] = (timeAgg[key] || 0) + amount;
                }
            });

            const tableData = Object.values(branchAgg).map(b => {
                const grossPay = grossPayMap[b.branch] || 0;
                return { branch: b.branch, revenue: b.revenue, grossPay, profit: b.revenue - grossPay };
            }).sort((a, b) => b.profit - a.profit);

            const totalProfit = tableData.reduce((s, r) => s + r.profit, 0);
            document.getElementById('total-bar').textContent = `Total Profit: ${formatCurrency2(totalProfit)}`;
            document.getElementById('print-header').textContent = 'Profit & Loss Report';

            // Render table
            const thead = document.getElementById('table-header');
            thead.innerHTML = '<th>Branch</th><th style="text-align:right">Revenue</th><th style="text-align:right">Gross Pay</th><th style="text-align:right">Profit</th>';
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            if (!tableData.length) { tbody.innerHTML = '<tr><td colspan="4" class="loading-indicator">No data.</td></tr>'; }
            else tableData.forEach(row => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.branch}</td><td style="text-align:right;font-weight:600">${formatCurrency(row.revenue)}</td><td style="text-align:right;font-weight:600">${formatCurrency(row.grossPay)}</td><td style="text-align:right;font-weight:600;color:${row.profit >= 0 ? '#10B981' : '#DC2626'}">${formatCurrency2(row.profit)}</td>`;
                tbody.appendChild(tr);
            });

            // Time-series for profit chart: subtract proportional gross pay
            const totalRevenue = Object.values(timeAgg).reduce((s, v) => s + v, 0);
            const totalGrossPay = rawBillingByBranch.reduce((s, r) => s + (Number(r.total_billing) || 0), 0);
            const timeSeries = Object.entries(timeAgg).sort((a, b) => a[0].localeCompare(b[0])).map(([k, rev]) => {
                const proportion = totalRevenue > 0 ? rev / totalRevenue : 0;
                return [k, rev - (totalGrossPay * proportion)];
            });

            renderTimeChart(timeSeries, 'Profit');
        }

        // ── Render Company Table ──────────────────────────────────
        function renderCompanyTable(report, data) {
            const thead = document.getElementById('table-header');
            if (report === 'DHR' || report === 'GSR') {
                thead.innerHTML = '<th>Company</th><th>Branch</th><th style="text-align:right">Revenue</th><th style="text-align:right">Hours</th>';
            } else {
                thead.innerHTML = '<th>Company</th><th>Branch</th><th style="text-align:right">Revenue</th>';
            }
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            const cols = (report === 'DHR' || report === 'GSR') ? 4 : 3;
            if (!data.length) { tbody.innerHTML = `<tr><td colspan="${cols}" class="loading-indicator">No data.</td></tr>`; return; }
            data.forEach(row => {
                const tr = document.createElement('tr');
                let html = `<td>${row.company}</td><td>${row.branch}</td><td style="text-align:right;font-weight:600">${formatCurrency(row.revenue)}</td>`;
                if (report === 'DHR' || report === 'GSR') html += `<td style="text-align:right;font-weight:600">${formatNumber(row.hours || 0, 2)}</td>`;
                tr.innerHTML = html;
                tbody.appendChild(tr);
            });
        }

        // ── Render Time-Series Chart ──────────────────────────────
        function renderTimeChart(timeSeries, label) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();

            const graphType = document.getElementById('graph_type').value;
            const forecastOn = document.getElementById('forecast_check').checked;
            const forecastEnd = document.getElementById('forecast_end').value;
            const interval = document.getElementById('interval_select').value;

            let labels = timeSeries.map(([k]) => k);
            let values = timeSeries.map(([, v]) => v);
            let forecastLabels = [];
            let forecastValues = [];

            // ── Forecast ──────────────────────────────────────────
            if (forecastOn && forecastEnd && values.length >= 2) {
                // Calculate average growth between intervals
                const growths = [];
                for (let i = 1; i < values.length; i++) {
                    growths.push(values[i] - values[i - 1]);
                }
                const avgGrowth = growths.reduce((s, g) => s + g, 0) / growths.length;
                const lastValue = values[values.length - 1];
                const lastDate = new Date(labels[labels.length - 1] + (interval === 'yearly' ? '-01-01' : interval === 'monthly' ? '-01' : ''));

                // Generate forecast intervals
                let current = new Date(lastDate);
                let currentVal = lastValue;
                const endDate = new Date(forecastEnd);
                let maxForecast = 52; // safety limit

                while (current < endDate && maxForecast-- > 0) {
                    if (interval === 'weekly') current.setDate(current.getDate() + 7);
                    else if (interval === 'monthly') current.setMonth(current.getMonth() + 1);
                    else current.setFullYear(current.getFullYear() + 1);

                    if (current > endDate) break;
                    currentVal += avgGrowth;
                    let key;
                    if (interval === 'weekly') key = current.toISOString().split('T')[0];
                    else if (interval === 'monthly') key = `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, '0')}`;
                    else key = String(current.getFullYear());
                    forecastLabels.push(key);
                    forecastValues.push(currentVal);
                }
            }

            const allLabels = [...labels, ...forecastLabels];
            const actualData = [...values, ...forecastValues.map(() => null)];
            const forecastData = [...values.map(() => null), ...(forecastValues.length ? [values[values.length - 1], ...forecastValues.slice(0, -1)] : [])];
            // Connect forecast: start from last actual point
            const forecastDataFull = values.map((_, i) => i === values.length - 1 ? values[i] : null);
            forecastValues.forEach(v => forecastDataFull.push(v));

            const segColors = values.map(v => v >= 0 ? 'rgba(124,58,237,0.7)' : 'rgba(255,99,132,0.7)');
            const forecastColors = forecastValues.map(() => 'rgba(124,58,237,0.3)');
            const allColors = [...segColors, ...forecastColors];

            if (graphType === 'pie') {
                // Pie: show only actual data aggregated
                const pieColors = allLabels.map((_, i) => `hsl(${260 + i * 18}, 60%, ${50 + (i % 4) * 8}%)`);
                mainChart = new Chart(ctx, {
                    type: 'pie',
                    data: { labels: allLabels, datasets: [{ data: [...values, ...forecastValues].map(Math.abs), backgroundColor: pieColors }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 11 } } }, datalabels: { display: false } } },
                });
                return;
            }

            // Bar or Line with trendline
            const datasets = [{
                label: label,
                data: actualData,
                backgroundColor: graphType === 'bar' ? segColors.concat(forecastValues.map(() => null)) : 'rgba(0,0,0,0)',
                borderColor: 'rgb(124,58,237)',
                borderWidth: 2,
                tension: 0.3,
                pointRadius: 4,
                pointBackgroundColor: 'rgb(124,58,237)',
                spanGaps: false,
            }];

            if (forecastValues.length > 0) {
                datasets.push({
                    label: 'Forecast',
                    data: forecastDataFull,
                    backgroundColor: graphType === 'bar' ? forecastColors.map(() => 'rgba(124,58,237,0.3)') : 'rgba(0,0,0,0)',
                    borderColor: 'rgba(124,58,237,0.4)',
                    borderWidth: 2,
                    borderDash: [6, 4],
                    tension: 0.3,
                    pointRadius: 4,
                    pointBackgroundColor: 'rgba(124,58,237,0.4)',
                    spanGaps: true,
                });
                // Adjust actual data to not include null fill for bar
                if (graphType === 'bar') {
                    datasets[0].data = [...values, ...forecastValues.map(() => 0)];
                    datasets[1].data = [...values.map(() => 0), ...forecastValues];
                }
            }

            // ── Trendline dataset (linear regression) ─────────────
            if ((graphType === 'bar' || graphType === 'line') && values.length >= 2) {
                const n = values.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                for (let i = 0; i < n; i++) {
                    sumX += i; sumY += values[i]; sumXY += i * values[i]; sumX2 += i * i;
                }
                const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                const intercept = (sumY - slope * sumX) / n;
                const totalPoints = allLabels.length;
                const trendData = Array.from({ length: totalPoints }, (_, i) => slope * i + intercept);

                datasets.push({
                    label: 'Trend',
                    data: trendData,
                    borderColor: slope >= 0 ? 'rgba(50,205,50,0.7)' : 'rgba(220,38,38,0.7)',
                    borderWidth: 2,
                    borderDash: [4, 4],
                    pointRadius: 0,
                    fill: false,
                    tension: 0,
                    type: 'line',
                });
            }

            mainChart = new Chart(ctx, {
                type: graphType,
                data: { labels: allLabels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: { mode: 'index', intersect: false, callbacks: { label: ctx => (ctx.dataset.label || '') + ': ' + formatCurrency2(ctx.parsed.y) } },
                        datalabels: { display: false },
                    },
                    scales: {
                        x: { ticks: { color: '#6B7280', maxRotation: 45 }, grid: { color: '#E8E8E8' } },
                        y: {
                            beginAtZero: false,
                            ticks: { callback: v => formatCurrency(v), color: '#6B7280' },
                            grid: { color: '#E8E8E8' },
                        },
                    },
                },
            });
        }

        // ── Event Listeners ───────────────────────────────────────
        document.getElementById('apply-btn').addEventListener('click', loadData);
        document.getElementById('start_date').addEventListener('change', loadData);
        document.getElementById('end_date').addEventListener('change', loadData);
        document.getElementById('report_type').addEventListener('change', processData);
        document.getElementById('branch_filter').addEventListener('change', processData);
