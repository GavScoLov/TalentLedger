<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Descending Revenue</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .viz-layout { display: grid; grid-template-columns: 38% 1fr; grid-template-rows: auto auto auto 1fr; gap: 16px; }
        .viz-filters { grid-row: 1; grid-column: 1 / 3; }
        .viz-report-title { grid-row: 2; grid-column: 1 / 3; }
        .viz-stats-bar { grid-row: 3; grid-column: 1 / 3; }
        .viz-table-section { grid-row: 4; grid-column: 1; }
        .viz-chart-section { grid-row: 4; grid-column: 2; }
        .filter-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .filter-row + .filter-row { margin-top: 8px; }
        .filter-row .form-select, .filter-row .form-input { min-width: 120px; }
        .filter-row label { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; white-space: nowrap; }
        .table-scroll { overflow-y: auto; max-height: calc(100vh - 480px); }
        .total-bar { background-color: var(--primary); color: #fff; padding: 8px 12px; border-radius: 8px; text-align: center; font-weight: 700; font-size: 15px; }
        .chart-wrap { position: relative; min-height: 350px; padding: 12px; flex: 1; }
        .chart-wrap canvas { max-height: 500px; }
        .loading-indicator { text-align: center; padding: 40px; color: var(--text-secondary); }
        .btn-icon { background: none; border: 1px solid var(--border-color); border-radius: 6px; padding: 6px 10px; cursor: pointer; display: flex; align-items: center; transition: background-color 0.2s; }
        .btn-icon:hover { background-color: var(--bg-default); }

        /* Report title bar */
        .report-title-bar { background: var(--bg-paper); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 10px 16px; text-align: center; }
        .report-title-bar h2 { margin: 0; font-size: 16px; font-weight: 700; color: var(--text-primary); }

        /* Stats bar */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .stat-card { background: var(--bg-paper); border: 1px solid var(--border-color); border-radius: var(--radius); padding: 12px 16px; text-align: center; }
        .stat-card .stat-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .stat-card .stat-value { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .stat-card .stat-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
        .stat-positive { color: #059669 !important; }
        .stat-negative { color: #DC2626 !important; }

        /* Custom toggle checkboxes for DHP/GSP */
        .toggle-checkbox input[type="checkbox"] { display: none; }
        .toggle-checkbox label {
            display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px;
            border: 2px solid var(--border-color); border-radius: 6px; font-size: 13px; font-weight: 600;
            color: var(--text-secondary); background: var(--bg-default); cursor: pointer; transition: all 0.2s;
        }
        .toggle-checkbox input[type="checkbox"]:checked + label {
            background: var(--primary); border-color: var(--primary); color: #fff;
        }

        @media (max-width: 900px) { .viz-layout { grid-template-columns: 1fr; } .viz-chart-section, .viz-table-section { grid-column: 1; } .stats-bar { grid-template-columns: repeat(2, 1fr); } }

        /* ── Print Styles ──────────────────────────────────────── */
        @media print {
            body { background: #fff !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .sidebar, .sidebar-overlay, .topbar, .viz-filters, .page-header, .page-subtitle { display: none !important; }
            .main-content { margin: 0 !important; padding: 0 !important; }
            .viz-layout { display: block !important; }
            .card { box-shadow: none !important; border: none !important; margin-bottom: 0; }
            .viz-chart-section { display: none !important; }
            /* Print chart page */
            .print-chart-page {
                display: block !important; page-break-before: always; padding: 20px 0;
            }
            .print-chart-page h2 {
                font-size: 18px; text-align: center; font-weight: 700; color: #000;
                border-bottom: 2px solid #333; padding-bottom: 8px; margin-bottom: 16px;
            }
            .print-chart-page img { width: 100%; max-height: 600px; object-fit: contain; }
            .print-header {
                display: block !important; font-size: 22px; text-align: center; font-weight: 700;
                padding: 12px 0 4px; color: #000; border-bottom: 2px solid #333; margin-bottom: 8px;
            }
            .print-sub-header {
                display: block !important; font-size: 13px; text-align: center; color: #555;
                margin-bottom: 12px;
            }
            .viz-report-title { margin-bottom: 8px; }
            .report-title-bar { border: none !important; padding: 0 !important; }
            .report-title-bar h2 { font-size: 14px; color: #333; }
            .viz-stats-bar { margin-bottom: 12px; }
            .stats-bar { grid-template-columns: repeat(4, 1fr) !important; gap: 8px !important; }
            .stat-card { border: 1px solid #ccc !important; padding: 8px !important; }
            .stat-label { font-size: 9px !important; }
            .stat-value { font-size: 14px !important; }
            .stat-sub { font-size: 10px !important; }
            .viz-table-section { grid-column: 1 / 3 !important; }
            .table-scroll { max-height: none !important; overflow: visible !important; }
            .data-table { width: 100% !important; border-collapse: collapse !important; font-size: 11px !important; }
            .data-table th {
                background: #EA8938 !important; color: #fff !important;
                border: 1px solid #C7712A !important; padding: 6px 8px !important;
                font-size: 11px !important; white-space: nowrap;
            }
            .data-table td {
                border: 1px solid #ddd !important; padding: 4px 8px !important;
                color: #000 !important; font-size: 11px !important;
            }
            .data-table tbody tr:nth-child(even) { background: #f9f9f9 !important; }
            .data-table tfoot td, .data-table tfoot th {
                background: #f0f0f0 !important; font-weight: 700 !important;
                border-top: 2px solid #333 !important;
            }
            .print-total-bar {
                display: block !important; margin-top: 8px; padding: 8px 12px;
                background: #EA8938 !important; color: #fff !important;
                font-weight: 700; text-align: right; font-size: 13px;
                border-radius: 4px;
            }
            .data-table tr { page-break-inside: avoid; }
        }

        /* Hidden elements only shown in print */
        .print-header, .print-sub-header, .print-total-bar, .print-chart-page { display: none; }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Descending Revenue</h1>
                <p class="page-subtitle">Revenue analytics by company and branch</p>
            </div>
            <div class="print-header" id="print-header"></div>
            <div class="print-sub-header" id="print-sub-header"></div>
            <div class="viz-layout">
                <div class="viz-filters">
                    <div class="card" style="padding:12px;">
                        <div class="filter-row">
                            <select class="form-select" id="branch_filter">
                                <option value="all" selected>All Branches</option>
                            </select>
                            <input class="form-input" type="date" id="start_date" style="max-width:150px;">
                            <input class="form-input" type="date" id="end_date" style="max-width:150px;">
                            <input class="form-input" type="text" id="company_search" placeholder="Search company..." style="max-width:180px;">
                            <button class="btn btn-primary" type="button" id="apply-btn" style="padding:6px 16px;">Apply</button>
                        </div>
                        <div class="filter-row">
                            <div class="toggle-checkbox">
                                <input type="checkbox" id="dhp_filter">
                                <label for="dhp_filter">DHP</label>
                            </div>
                            <div class="toggle-checkbox">
                                <input type="checkbox" id="gsp_filter">
                                <label for="gsp_filter">GSP</label>
                            </div>
                            <select class="form-select" id="interval_select" style="max-width:120px;">
                                <option value="weekly" selected>Weekly</option>
                                <option value="monthly">Monthly</option>
                                <option value="yearly">Yearly</option>
                            </select>
                            <select class="form-select" id="graph_type" style="max-width:100px;">
                                <option value="bar" selected>Bar</option>
                                <option value="line">Line</option>
                                <option value="pie">Pie</option>
                            </select>
                            <select class="form-select" id="group_by" style="max-width:160px;">
                                <option value="company" selected>Group By: Company</option>
                                <option value="branch">Group By: Branch</option>
                            </select>
                            <div class="toggle-checkbox">
                                <input type="checkbox" id="forecast_check">
                                <label for="forecast_check">Forecast</label>
                            </div>
                            <input class="form-input" type="date" id="forecast_end" style="max-width:150px;display:none;">
                            <button class="btn-icon" type="button" id="print-btn" title="Print" style="margin-left:auto;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="viz-report-title">
                    <div class="report-title-bar"><h2 id="report-title">PSA - DRG - Descending Revenue Graph</h2></div>
                </div>
                <div class="viz-stats-bar">
                    <div class="stats-bar">
                        <div class="stat-card">
                            <div class="stat-label">Average Revenue</div>
                            <div class="stat-value" id="stat-avg-revenue">$0</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Trend % Change</div>
                            <div class="stat-value" id="stat-pct-change">0%</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Intervals</div>
                            <div class="stat-value" id="stat-intervals">0</div>
                            <div class="stat-sub" id="stat-intervals-detail">0 actual / 0 forecast</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">Total</div>
                            <div class="stat-value" id="stat-total">$0</div>
                        </div>
                    </div>
                </div>
                <div class="viz-table-section">
                    <div class="card" style="padding:0;overflow:hidden;">
                        <div class="table-scroll">
                            <table class="data-table" id="data-table">
                                <thead><tr id="table-header"></tr></thead>
                                <tbody id="data-table-body">
                                    <tr><td colspan="4" class="loading-indicator">Loading data...</td></tr>
                                </tbody>
                                <tfoot id="table-footer" style="display:none;"></tfoot>
                            </table>
                        </div>
                        <div class="print-total-bar" id="print-total-bar"></div>
                    </div>
                </div>
                <div class="viz-chart-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="chart-wrap">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <div class="print-chart-page" id="print-chart-page">
                <h2 id="print-chart-title"></h2>
                <img id="print-chart-img" src="" alt="Chart">
            </div>
        </div>
    </div>

    <script type="module">
        import { checkAuth, checkPageAccess } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';
        import {
            fetchInvoiceRegister, fetchTotalHoursByBranch, fetchTotalBillingByBranch,
            fetchTotalHoursByCompany, fetchTotalBillingByCompany,
            formatCurrency, formatCurrency2, formatNumber, getDefaultStartDate, getDefaultEndDate
        } from './src/apiClient.js';

        await checkAuth();
        await checkPageAccess('data-visualization');
        renderNavbar();
        await renderSidebar();
        initInactivityTimer();

        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#6B7280';

        const REPORT_TITLE = 'PSA - DRG - Descending Revenue Graph';

        // ── State ─────────────────────────────────────────────────
        let rawInvoices = [];
        let rawBillingByBranch = [];
        let mainChart = null;

        // ── Init ──────────────────────────────────────────────────
        document.getElementById('start_date').value = getDefaultStartDate();
        document.getElementById('end_date').value = getDefaultEndDate();
        const fEnd = new Date(); fEnd.setMonth(fEnd.getMonth() + 3);
        document.getElementById('forecast_end').value = fEnd.toISOString().split('T')[0];

        // ── Helper: filter Corporate branches ────────────────────
        function isCorporateBranch(name) {
            const n = (name || '').toLowerCase();
            return n.includes('corporate') || n.includes('_corp');
        }

        // ── Fetch Data ────────────────────────────────────────────
        async function loadData() {
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            if (!startDate || !endDate) return;

            document.getElementById('data-table-body').innerHTML = '<tr><td colspan="6" class="loading-indicator">Loading data...</td></tr>';

            try {
                const [invoices, billingBranch] = await Promise.all([
                    fetchInvoiceRegister(startDate, endDate),
                    fetchTotalBillingByBranch(startDate, endDate),
                ]);

                rawInvoices = invoices;
                rawBillingByBranch = billingBranch;

                populateBranchFilter();
                processData();
            } catch (err) {
                document.getElementById('data-table-body').innerHTML = `<tr><td colspan="6" class="loading-indicator" style="color:#DC2626">Error: ${err.message}</td></tr>`;
            }
        }

        function populateBranchFilter() {
            const branchSet = new Set();
            rawInvoices.forEach(r => { if (r.branchname && !isCorporateBranch(r.branchname)) branchSet.add(r.branchname); });
            rawBillingByBranch.forEach(r => { if (r.branch && !isCorporateBranch(r.branch)) branchSet.add(r.branch); });
            const sel = document.getElementById('branch_filter');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">All Branches</option>';
            [...branchSet].sort().forEach(b => {
                const opt = document.createElement('option');
                opt.value = b; opt.textContent = b;
                if (b === cur) opt.selected = true;
                sel.appendChild(opt);
            });
        }

        // ── Process Data ──────────────────────────────────────────
        function processData() {
            const branch = document.getElementById('branch_filter').value;
            const search = (document.getElementById('company_search').value || '').toLowerCase();
            const dhpOn = document.getElementById('dhp_filter').checked;
            const gspOn = document.getElementById('gsp_filter').checked;

            // Update titles
            document.getElementById('report-title').textContent = REPORT_TITLE;
            document.getElementById('print-header').textContent = REPORT_TITLE;

            // Print sub-header
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            const branchLabel = branch === 'all' ? 'All Branches' : branch;
            const filters = [];
            if (dhpOn) filters.push('DHP Only');
            if (gspOn) filters.push('GSP Only');
            const filterStr = filters.length ? ` | ${filters.join(', ')}` : '';
            document.getElementById('print-sub-header').textContent = `${startDate} to ${endDate} | ${branchLabel}${filterStr}`;

            // Filter invoices (DRR = all companies, no DHP/GSR exclusion by report type)
            let filtered = rawInvoices.filter(r => {
                if (isCorporateBranch(r.branchname)) return false;
                if (branch !== 'all' && r.branchname !== branch) return false;
                const isDHP = (r.customername || '').toUpperCase().includes('DHP');
                if (dhpOn && !isDHP) return false;
                if (gspOn && isDHP) return false;
                if (search && !(r.customername || '').toLowerCase().includes(search)) return false;
                return true;
            });

            const groupBy = document.getElementById('group_by').value;

            // Table: aggregate
            const agg = {};
            filtered.forEach(r => {
                const key = groupBy === 'branch' ? (r.branchname || 'Unknown') : (r.customername || 'Unknown');
                if (!agg[key]) agg[key] = { name: key, branch: r.branchname || '', revenue: 0, branches: new Set() };
                agg[key].revenue += Number(r.invoiceamount) || 0;
                if (r.branchname) agg[key].branches.add(r.branchname);
            });

            const tableData = Object.values(agg).map(c => ({
                ...c, branch: [...c.branches].join(', ')
            })).sort((a, b) => b.revenue - a.revenue);

            // Time-series
            const interval = document.getElementById('interval_select').value;
            const timeAgg = {};
            filtered.forEach(r => {
                const weekend = r.weekendbill || '';
                if (!weekend) return;
                let key;
                if (interval === 'weekly') key = weekend;
                else if (interval === 'monthly') key = weekend.substring(0, 7);
                else key = weekend.substring(0, 4);
                timeAgg[key] = (timeAgg[key] || 0) + (Number(r.invoiceamount) || 0);
            });

            const timeSeries = Object.entries(timeAgg).sort((a, b) => a[0].localeCompare(b[0]));

            renderCompanyTable(tableData, groupBy);
            renderTimeChart(timeSeries, 'Descending Revenue');
        }

        // ── Render Table ──────────────────────────────────────────
        function renderCompanyTable(data, groupBy) {
            const thead = document.getElementById('table-header');
            if (groupBy === 'branch') {
                thead.innerHTML = '<th>Branch</th><th style="text-align:right">Revenue</th>';
            } else {
                thead.innerHTML = '<th>Company</th><th>Branch</th><th style="text-align:right">Revenue</th>';
            }
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            const cols = groupBy === 'branch' ? 2 : 3;
            if (!data.length) { tbody.innerHTML = `<tr><td colspan="${cols}" class="loading-indicator">No data.</td></tr>`; return; }

            let totalRevenue = 0;
            data.forEach(row => {
                totalRevenue += row.revenue;
                const tr = document.createElement('tr');
                if (groupBy === 'branch') {
                    tr.innerHTML = `<td>${row.name}</td><td style="text-align:right;font-weight:600">${formatCurrency2(row.revenue)}</td>`;
                } else {
                    tr.innerHTML = `<td>${row.name}</td><td>${row.branch}</td><td style="text-align:right;font-weight:600">${formatCurrency2(row.revenue)}</td>`;
                }
                tbody.appendChild(tr);
            });

            const tfoot = document.getElementById('table-footer');
            tfoot.style.display = '';
            if (groupBy === 'branch') {
                tfoot.innerHTML = `<tr><td style="font-weight:700">Total (${data.length} rows)</td><td style="text-align:right;font-weight:700">${formatCurrency2(totalRevenue)}</td></tr>`;
            } else {
                tfoot.innerHTML = `<tr><td style="font-weight:700">Total (${data.length} rows)</td><td></td><td style="text-align:right;font-weight:700">${formatCurrency2(totalRevenue)}</td></tr>`;
            }
            document.getElementById('print-total-bar').textContent = `Total Revenue: ${formatCurrency2(totalRevenue)} | ${data.length} rows`;
        }

        // ── Update Stats Bar ─────────────────────────────────────
        function updateStats(timeSeries, forecastCount) {
            const values = timeSeries.map(([, v]) => v);
            const total = values.reduce((s, v) => s + v, 0);
            const avg = values.length > 0 ? total / values.length : 0;
            const actualCount = values.length;
            const totalIntervals = actualCount + forecastCount;

            // Trend % Change = ((avg / startValue) - 1) / totalIntervals
            let pctChange = 0;
            if (values.length >= 2) {
                const startValue = values[0];
                if (Math.abs(startValue) > 0.01 && totalIntervals > 0) {
                    pctChange = ((avg / startValue) - 1) / totalIntervals * 100;
                }
            }

            document.getElementById('stat-avg-revenue').textContent = formatCurrency2(avg);
            const pctEl = document.getElementById('stat-pct-change');
            pctEl.textContent = (pctChange >= 0 ? '+' : '') + pctChange.toFixed(2) + '%';
            pctEl.className = 'stat-value ' + (pctChange >= 0 ? 'stat-positive' : 'stat-negative');
            document.getElementById('stat-intervals').textContent = totalIntervals;
            document.getElementById('stat-intervals-detail').textContent = `${actualCount} actual / ${forecastCount} forecast`;
            document.getElementById('stat-total').textContent = formatCurrency2(total);
        }

        // ── Render Time-Series Chart ──────────────────────────────
        function renderTimeChart(timeSeries, label) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (mainChart) mainChart.destroy();

            const graphType = document.getElementById('graph_type').value;
            const forecastOn = document.getElementById('forecast_check').checked;
            const forecastEnd = document.getElementById('forecast_end').value;
            const interval = document.getElementById('interval_select').value;

            let labels = timeSeries.map(([k]) => k);
            let values = timeSeries.map(([, v]) => v);
            let forecastLabels = [];
            let forecastValues = [];

            // Trendline (linear regression)
            let slope = 0, intercept = 0;
            if (values.length >= 2) {
                const n = values.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                for (let i = 0; i < n; i++) {
                    sumX += i; sumY += values[i]; sumXY += i * values[i]; sumX2 += i * i;
                }
                slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                intercept = (sumY - slope * sumX) / n;
            }

            // Forecast
            if (forecastOn && forecastEnd && values.length >= 2) {
                const growths = [];
                for (let i = 1; i < values.length; i++) growths.push(values[i] - values[i - 1]);
                const avgGrowth = growths.reduce((s, g) => s + g, 0) / growths.length;
                const lastValue = values[values.length - 1];
                const lastDate = new Date(labels[labels.length - 1] + (interval === 'yearly' ? '-01-01' : interval === 'monthly' ? '-01' : ''));

                let current = new Date(lastDate);
                let currentVal = lastValue;
                const endDate = new Date(forecastEnd);
                let maxForecast = 52;

                while (current < endDate && maxForecast-- > 0) {
                    if (interval === 'weekly') current.setDate(current.getDate() + 7);
                    else if (interval === 'monthly') current.setMonth(current.getMonth() + 1);
                    else current.setFullYear(current.getFullYear() + 1);
                    if (current > endDate) break;
                    currentVal += avgGrowth;
                    let key;
                    if (interval === 'weekly') key = current.toISOString().split('T')[0];
                    else if (interval === 'monthly') key = `${current.getFullYear()}-${String(current.getMonth() + 1).padStart(2, '0')}`;
                    else key = String(current.getFullYear());
                    forecastLabels.push(key);
                    forecastValues.push(currentVal);
                }
            }

            updateStats(timeSeries, forecastValues.length);

            const allLabels = [...labels, ...forecastLabels];
            const actualData = [...values, ...forecastValues.map(() => null)];
            const forecastDataFull = values.map((_, i) => i === values.length - 1 ? values[i] : null);
            forecastValues.forEach(v => forecastDataFull.push(v));

            const orangeMain = 'rgba(234,137,56,0.7)';
            const orangeBorder = 'rgb(234,137,56)';
            const orangeForecast = 'rgba(234,137,56,0.3)';

            const segColors = values.map(v => v >= 0 ? orangeMain : 'rgba(255,99,132,0.7)');

            if (graphType === 'pie') {
                const pieColors = allLabels.map((_, i) => `hsl(${25 + i * 12}, ${70 - (i % 3) * 10}%, ${50 + (i % 4) * 8}%)`);
                mainChart = new Chart(ctx, {
                    type: 'pie',
                    data: { labels: allLabels, datasets: [{ data: [...values, ...forecastValues].map(Math.abs), backgroundColor: pieColors }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 11 } } }, datalabels: { display: false } } },
                });
                return;
            }

            const datasets = [{
                label: label,
                data: actualData,
                backgroundColor: graphType === 'bar' ? segColors.concat(forecastValues.map(() => null)) : 'rgba(0,0,0,0)',
                borderColor: orangeBorder, borderWidth: 2, tension: 0.3, pointRadius: 4,
                pointBackgroundColor: orangeBorder, spanGaps: false,
            }];

            if (forecastValues.length > 0) {
                datasets.push({
                    label: 'Forecast', data: forecastDataFull,
                    backgroundColor: graphType === 'bar' ? forecastValues.map(() => orangeForecast) : 'rgba(0,0,0,0)',
                    borderColor: 'rgba(234,137,56,0.4)', borderWidth: 2, borderDash: [6, 4],
                    tension: 0.3, pointRadius: 4, pointBackgroundColor: 'rgba(234,137,56,0.4)', spanGaps: true,
                });
                if (graphType === 'bar') {
                    datasets[0].data = [...values, ...forecastValues.map(() => 0)];
                    datasets[1].data = [...values.map(() => 0), ...forecastValues];
                }
            }

            if ((graphType === 'bar' || graphType === 'line') && values.length >= 2) {
                const trendData = Array.from({ length: allLabels.length }, (_, i) => slope * i + intercept);
                datasets.push({
                    label: 'Trend', data: trendData,
                    borderColor: slope >= 0 ? 'rgba(50,205,50,0.7)' : 'rgba(220,38,38,0.7)',
                    borderWidth: 2, borderDash: [4, 4], pointRadius: 0, fill: false, tension: 0, type: 'line',
                });
            }

            mainChart = new Chart(ctx, {
                type: graphType,
                data: { labels: allLabels, datasets },
                plugins: [ChartDataLabels],
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' },
                        tooltip: { mode: 'index', intersect: false, callbacks: { label: ctx => (ctx.dataset.label || '') + ': ' + formatCurrency2(ctx.parsed.y) } },
                        datalabels: {
                            display: function(context) {
                                if (context.dataset.label === 'Trend') return false;
                                const val = context.parsed?.y ?? context.parsed;
                                return val !== null && val !== undefined && val !== 0;
                            },
                            anchor: graphType === 'bar' ? 'end' : 'end',
                            align: graphType === 'bar' ? 'top' : 'top',
                            color: '#333',
                            font: { size: 10, weight: '600' },
                            formatter: (value) => formatCurrency(value),
                            rotation: graphType === 'bar' ? -45 : 0,
                            offset: 2,
                        },
                    },
                    scales: {
                        x: { ticks: { color: '#6B7280', maxRotation: 45 }, grid: { color: '#E8E8E8' } },
                        y: { beginAtZero: false, ticks: { callback: v => formatCurrency(v), color: '#6B7280' }, grid: { color: '#E8E8E8' } },
                    },
                    layout: { padding: { top: 30 } },
                },
            });
        }

        // ── Event Listeners ───────────────────────────────────────
        document.getElementById('apply-btn').addEventListener('click', loadData);
        document.getElementById('start_date').addEventListener('change', loadData);
        document.getElementById('end_date').addEventListener('change', loadData);
        document.getElementById('branch_filter').addEventListener('change', processData);
        document.getElementById('company_search').addEventListener('input', processData);
        document.getElementById('dhp_filter').addEventListener('change', processData);
        document.getElementById('gsp_filter').addEventListener('change', processData);
        document.getElementById('interval_select').addEventListener('change', processData);
        document.getElementById('graph_type').addEventListener('change', processData);
        document.getElementById('group_by').addEventListener('change', processData);
        document.getElementById('forecast_check').addEventListener('change', () => {
            document.getElementById('forecast_end').style.display = document.getElementById('forecast_check').checked ? '' : 'none';
            processData();
        });
        document.getElementById('forecast_end').addEventListener('change', processData);
        document.getElementById('print-btn').addEventListener('click', () => {
            // Snapshot chart to print page
            if (mainChart) {
                const imgData = mainChart.toBase64Image();
                document.getElementById('print-chart-img').src = imgData;
                document.getElementById('print-chart-title').textContent = REPORT_TITLE;
            }
            setTimeout(() => window.print(), 100);
        });

        setTimeout(() => loadData(), 100);
    </script>
</body>
</html>
