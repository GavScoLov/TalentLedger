<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Data Visualization</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/9352/9352254.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .viz-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .viz-nav-btn {
            padding: 10px 20px; border-radius: 8px; border: 2px solid var(--border-color);
            background-color: var(--bg-paper); color: var(--text-primary);
            font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.2s;
            position: relative;
        }
        .viz-nav-btn:hover { border-color: var(--primary); background-color: rgba(var(--primary-rgb), 0.05); }
        .viz-nav-btn .dropdown-content {
            visibility: hidden; opacity: 0; position: absolute; top: 100%; left: 0;
            background-color: var(--bg-paper); min-width: 160px; box-shadow: var(--shadow-md);
            z-index: 10; border-radius: 8px; transition: opacity 0.15s; margin-top: 4px;
        }
        .viz-nav-btn:hover .dropdown-content { visibility: visible; opacity: 1; }
        .viz-nav-btn .dropdown-content a {
            color: var(--text-primary); padding: 10px 16px; text-decoration: none; display: block;
            border-bottom: 1px solid var(--border-color); font-size: 14px; font-weight: 400;
        }
        .viz-nav-btn .dropdown-content a:last-child { border-bottom: none; }
        .viz-nav-btn .dropdown-content a:hover { background-color: var(--bg-default); }
        .viz-layout {
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr; gap: 16px;
        }
        .viz-filters { grid-row: 1; grid-column: 1 / 3; }
        .viz-table-section { grid-row: 2; grid-column: 1; }
        .viz-chart-section { grid-row: 2; grid-column: 2; }
        .table-scroll { overflow-y: auto; max-height: calc(100vh - 380px); }
        .chart-wrap { position: relative; min-height: 350px; padding: 12px; }
        @media (max-width: 900px) {
            .viz-layout { grid-template-columns: 1fr; }
            .viz-chart-section { grid-column: 1; }
        }
        /* Branch Goal Modal */
        .goal-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center;
        }
        .goal-modal-overlay.open { display: flex; }
        .goal-modal {
            background: var(--bg-paper); border-radius: var(--radius-lg); box-shadow: var(--shadow-md);
            padding: 28px 32px; width: 100%; max-width: 420px; position: relative;
        }
        .goal-modal h3 { margin: 0 0 20px 0; font-size: 1.125rem; font-weight: 700; color: var(--text-primary); }
        .goal-modal .form-group { margin-bottom: 16px; }
        .goal-modal .form-group label { display: block; margin-bottom: 6px; font-size: 0.8125rem; font-weight: 600; color: var(--text-secondary); }
        .goal-modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .goal-modal .btn-cancel {
            padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border-color);
            background: var(--bg-paper); color: var(--text-primary); font-weight: 600; font-size: 0.875rem;
            cursor: pointer; transition: all 0.2s;
        }
        .goal-modal .btn-cancel:hover { background: var(--bg-default); }
        .notice { padding: 10px 14px; border-radius: var(--radius); font-size: 0.875rem; margin-top: 12px; }
        .notice-success { background: #d4edda; color: #155724; }
        .notice-error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header">
                <h1 class="page-title">Data Visualization</h1>
                <p class="page-subtitle">Revenue and performance analytics</p>
            </div>
            <div class="viz-nav">
                <div class="viz-nav-btn">
                    THC
                    <div class="dropdown-content">
                        <a href="#" onclick="switchView('Pie Graph')">Pie Graph</a>
                        <a href="#" onclick="switchView('Bar Graph')">Bar Graph</a>
                        <a href="#" onclick="switchView('Master')">Master</a>
                    </div>
                </div>
                <div class="viz-nav-btn">
                    WRO
                    <div class="dropdown-content">
                        <a href="#" onclick="switchView('WRO')">Weekly Revenue</a>
                    </div>
                </div>
                <div class="viz-nav-btn">
                    MRO
                    <div class="dropdown-content">
                        <a href="#" onclick="switchView('MRO')">Monthly Revenue</a>
                    </div>
                </div>
                <div class="viz-nav-btn">
                    DHP
                    <div class="dropdown-content">
                        <a href="#" onclick="switchView('DHP Hours')">DHP Hours</a>
                        <a href="#" onclick="switchView('DHP Billing')">DHP Billing</a>
                    </div>
                </div>
                <div class="viz-nav-btn">
                    GSP
                    <div class="dropdown-content">
                        <a href="#" onclick="switchView('GSP Hours')">GSP Hours</a>
                    </div>
                </div>
                <div class="viz-nav-btn">
                    RPT
                    <div class="dropdown-content">
                        <a href="#" onclick="switchView('Report')">Report</a>
                    </div>
                </div>
            </div>
            <div class="viz-layout">
                <div class="viz-filters">
                    <div class="card" style="padding:10px;">
                        <form id="filter-table-form" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                            <input class="form-input" type="date" id="start_date" style="max-width:160px;">
                            <input class="form-input" type="date" id="end_date" style="max-width:160px;">
                            <select class="form-select" id="branch_filter">
                                <option value="all" selected>All Branches</option>
                                <option value="Austell">Austell</option>
                                <option value="Rome">Rome</option>
                                <option value="Kennesaw">Kennesaw</option>
                            </select>
                            <button class="btn btn-primary" type="submit" style="padding:8px 16px;">Apply</button>
                            <button class="btn btn-primary" type="button" id="open-goal-modal" style="padding:8px 16px;margin-left:auto;">+ Branch Goal</button>
                        </form>
                    </div>
                </div>
                <div class="viz-table-section">
                    <div class="card" style="padding:0;overflow:hidden;">
                        <div class="table-scroll">
                            <table class="data-table" id="data-table">
                                <thead>
                                    <tr>
                                        <th class="sortable">Branch</th>
                                        <th class="sortable">Company</th>
                                        <th class="sortable" style="text-align:right">Revenue</th>
                                        <th class="sortable" style="text-align:right">Hours</th>
                                        <th class="sortable" style="text-align:right">Billing</th>
                                    </tr>
                                </thead>
                                <tbody id="data-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="viz-chart-section">
                    <div class="card">
                        <div class="chart-wrap">
                            <canvas id="mainChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Branch Goal Modal -->
    <div class="goal-modal-overlay" id="goal-modal-overlay">
        <div class="goal-modal">
            <h3>Add Branch Goal</h3>
            <form id="goal-form">
                <div class="form-group">
                    <label for="branch_name">Branch Name</label>
                    <input class="form-input" type="text" id="branch_name" name="branch_name" required placeholder="e.g., Rome">
                </div>
                <div class="form-group">
                    <label for="goal_amount">Monthly Goal ($)</label>
                    <input class="form-input" type="number" id="goal_amount" name="goal_amount" required step="0.01" placeholder="e.g., 50000">
                </div>
                <div class="form-group">
                    <label for="goal_year">Year</label>
                    <input class="form-input" type="number" id="goal_year" name="goal_year" required min="2000" max="2099" placeholder="YYYY">
                </div>
                <div id="form-message"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="close-goal-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary" style="padding:8px 16px;">Save Goal</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { checkAuth, checkPageAccess } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';

        await checkAuth();
        await checkPageAccess('data-visualization');
        renderNavbar();
        await renderSidebar();
        initInactivityTimer();
    </script>
    <script>
        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#6B7280';

        const sampleData = {
            labels: ['Austell', 'Rome', 'Kennesaw', 'Cartersville', 'Adairsville'],
            revenues: [45000, 38000, 52000, 28000, 31000],
            hours: [1200, 980, 1400, 750, 820],
        };

        let currentChart = null;
        let currentView = 'Pie Graph';

        function switchView(view) {
            currentView = view;
            renderChart();
        }

        function renderChart() {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (currentChart) currentChart.destroy();

            const colors = ['rgba(124,58,237,0.7)', 'rgba(16,185,129,0.7)', 'rgba(245,158,11,0.7)', 'rgba(59,130,246,0.7)', 'rgba(239,68,68,0.7)'];

            if (currentView === 'Pie Graph') {
                currentChart = new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: sampleData.labels,
                        datasets: [{ data: sampleData.revenues, backgroundColor: colors }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
                });
            } else {
                currentChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: sampleData.labels,
                        datasets: [{ label: 'Revenue ($)', data: sampleData.revenues, backgroundColor: colors }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }
                });
            }
        }

        function renderTable() {
            const tbody = document.getElementById('data-table-body');
            tbody.innerHTML = '';
            sampleData.labels.forEach((branch, i) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${branch}</td>
                    <td>Sample Co.</td>
                    <td style="text-align:right;font-weight:600">$${sampleData.revenues[i].toLocaleString()}</td>
                    <td style="text-align:right;font-weight:600">${sampleData.hours[i]}</td>
                    <td style="text-align:right;font-weight:600">$${(sampleData.revenues[i] * 1.15).toFixed(2)}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        const today = new Date();
        const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        document.getElementById('start_date').value = lastMonth.toISOString().split('T')[0];
        document.getElementById('end_date').value = today.toISOString().split('T')[0];

        renderChart();
        renderTable();

        document.getElementById('filter-table-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Data visualization filters will be connected once a data source table is created in Supabase.');
        });

        // Branch Goal Modal
        const goalOverlay = document.getElementById('goal-modal-overlay');
        document.getElementById('goal_year').value = new Date().getFullYear();

        document.getElementById('open-goal-modal').addEventListener('click', () => {
            goalOverlay.classList.add('open');
        });
        document.getElementById('close-goal-modal').addEventListener('click', () => {
            goalOverlay.classList.remove('open');
            document.getElementById('form-message').innerHTML = '';
        });
        goalOverlay.addEventListener('click', (e) => {
            if (e.target === goalOverlay) {
                goalOverlay.classList.remove('open');
                document.getElementById('form-message').innerHTML = '';
            }
        });

        document.getElementById('goal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageEl = document.getElementById('form-message');
            const branchName = document.getElementById('branch_name').value;
            const goalAmount = document.getElementById('goal_amount').value;
            const goalYear = document.getElementById('goal_year').value;

            if (!branchName || !goalYear) {
                messageEl.innerHTML = '<div class="notice notice-error">Error: Branch name, goal amount, and year are required.</div>';
                return;
            }

            try {
                messageEl.innerHTML = `<div class="notice notice-success">Monthly Goal for ${branchName} in ${goalYear} saved successfully!</div>`;
                e.target.reset();
                document.getElementById('goal_year').value = new Date().getFullYear();
            } catch (err) {
                messageEl.innerHTML = `<div class="notice notice-error">An unexpected error occurred: ${err.message}</div>`;
            }
        });
    </script>
</body>
</html>
