<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentLedger - Direct Hire</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <link rel="icon" type="image/png" href="./assets/TalentLedger-Icon.png">
    <link rel="shortcut icon" href="./assets/TalentLedger-Icon.png">
    <link rel="stylesheet" href="./src/design-system.css">
    <style>
        .report-layout { display: grid; grid-template-columns: 35% 1fr; grid-template-rows: auto 1fr; gap: 16px; }
        .report-tabs { grid-row: 1; grid-column: 1 / 3; }
        .report-table-section { grid-row: 2; grid-column: 1; display: flex; flex-direction: column; }
        .report-chart-section { grid-row: 2; grid-column: 2; display: flex; flex-direction: column; }
        .filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; padding: 10px; }
        .table-scroll { overflow-y: auto; max-height: calc(100vh - 340px); }
        .total-bar { background-color: var(--primary); color: #fff; padding: 8px 12px; border-radius: 0 0 8px 8px; text-align: center; font-weight: 700; font-size: 15px; }
        .chart-wrap { position: relative; flex: 1; min-height: 300px; padding: 12px; }
        .loading-indicator { text-align: center; padding: 40px; color: var(--text-secondary); }
        @media (max-width: 900px) { .report-layout { grid-template-columns: 1fr; } .report-chart-section { grid-column: 1; } }
    </style>
</head>
<body>
    <div class="app-layout">
        <div class="main-content">
            <div class="page-header"><h1 class="page-title">Direct Hire Placements</h1></div>
            <div class="report-layout">
                <div class="report-tabs">
                    <div class="card" style="padding:8px;">
                        <div class="tab-nav" style="margin:0;border:0;">
                            <a href="./profit-loss.html" class="tab-nav-item">P&L</a>
                            <a href="./descending-revenue.html" class="tab-nav-item">Desc. Revenue</a>
                            <a href="./direct-hire.html" class="tab-nav-item active">Direct Hire</a>
                            <a href="./general-staffing.html" class="tab-nav-item">Gen. Staffing</a>
                            <div style="flex:1;display:flex;gap:6px;justify-content:flex-end;align-items:center;">
                                <input class="form-input" type="date" id="start_date" style="max-width:150px;">
                                <input class="form-input" type="date" id="end_date" style="max-width:150px;">
                                <input class="form-input" type="text" id="company_search" placeholder="Search company..." style="max-width:180px;">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="report-table-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="filter-bar">
                            <select class="form-select" id="table_branch_filter"><option value="all" selected>All Branches</option></select>
                            <button class="btn btn-primary" type="button" id="apply-btn" style="padding:6px 16px;">Apply</button>
                        </div>
                        <div class="table-scroll">
                            <table class="data-table" id="dhp-table">
                                <thead><tr><th>Company</th><th>Branch</th><th style="text-align:right">DHP Billing</th><th style="text-align:right">DHP Hours</th></tr></thead>
                                <tbody id="dhp-table-body"><tr><td colspan="4" class="loading-indicator">Loading data...</td></tr></tbody>
                            </table>
                        </div>
                        <div class="total-bar" id="total-dhp">Total DHP Billing: $0</div>
                    </div>
                </div>
                <div class="report-chart-section">
                    <div class="card" style="padding:0;overflow:hidden;flex:1;display:flex;flex-direction:column;">
                        <div class="filter-bar">
                            <select class="form-select" id="graph_type"><option value="bar" selected>Bar</option><option value="line">Line</option></select>
                        </div>
                        <div class="chart-wrap"><canvas id="dhpChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module">
        import { checkAuth, checkPageAccess } from './src/auth.js';
        import { initInactivityTimer } from './src/main.js';
        import { renderNavbar } from './src/components/navbar.js';
        import { renderSidebar } from './src/components/sidebar.js';
        import { fetchTotalBillingByCompany, fetchTotalHoursByCompany, formatCurrency, formatNumber, getDefaultStartDate, getDefaultEndDate } from './src/apiClient.js';

        await checkAuth();
        await checkPageAccess('commission');
        renderNavbar();
        await renderSidebar();
        initInactivityTimer();

        Chart.defaults.font.family = "'Inter', sans-serif";
        Chart.defaults.color = '#6B7280';

        let companyData = [];
        let timeSeriesData = [];
        let rawBilling = [];
        let dhpChart = null;

        document.getElementById('start_date').value = getDefaultStartDate();
        document.getElementById('end_date').value = getDefaultEndDate();

        async function loadData() {
            const startDate = document.getElementById('start_date').value;
            const endDate = document.getElementById('end_date').value;
            if (!startDate || !endDate) return;
            document.getElementById('dhp-table-body').innerHTML = '<tr><td colspan="4" class="loading-indicator">Loading data...</td></tr>';
            try {
                const [billingData, hoursData] = await Promise.all([
                    fetchTotalBillingByCompany(startDate, endDate),
                    fetchTotalHoursByCompany(startDate, endDate),
                ]);

                // Store raw billing for time-series (already has weekend_bill)
                rawBilling = billingData.filter(r => (r.company_name || '').toUpperCase().includes('DHP'));

                // Aggregate by company for table
                const billingMap = {};
                billingData.forEach(r => {
                    if (!(r.company_name || '').toUpperCase().includes('DHP')) return;
                    const key = r.company_name;
                    if (!billingMap[key]) billingMap[key] = { company: key, branch: r.branch || '', billing: 0, hours: 0, branches: new Set() };
                    billingMap[key].billing += Number(r.total_billing) || 0;
                    if (r.branch) billingMap[key].branches.add(r.branch);
                });
                hoursData.forEach(r => {
                    if (!(r.company_name || '').toUpperCase().includes('DHP')) return;
                    const key = r.company_name;
                    if (!billingMap[key]) billingMap[key] = { company: key, branch: r.branch || '', billing: 0, hours: 0, branches: new Set() };
                    billingMap[key].hours += Number(r.total_hours) || 0;
                    if (r.branch) billingMap[key].branches.add(r.branch);
                });

                companyData = Object.values(billingMap).map(c => ({
                    company: c.company, branch: [...c.branches].join(', '), billing: c.billing, hours: c.hours
                })).sort((a, b) => b.billing - a.billing);

                populateBranchFilter();
                processData();
            } catch (err) {
                document.getElementById('dhp-table-body').innerHTML = `<tr><td colspan="4" class="loading-indicator" style="color:#DC2626">Error: ${err.message}</td></tr>`;
            }
        }

        function populateBranchFilter() {
            const branches = new Set();
            companyData.forEach(c => c.branch.split(', ').forEach(b => { if (b) branches.add(b); }));
            const sel = document.getElementById('table_branch_filter');
            const cur = sel.value;
            sel.innerHTML = '<option value="all">All Branches</option>';
            [...branches].sort().forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; if (b === cur) o.selected = true; sel.appendChild(o); });
        }

        function processData() {
            const bf = document.getElementById('table_branch_filter').value;
            const search = (document.getElementById('company_search').value || '').toLowerCase();

            let filteredRaw = rawBilling;
            if (bf !== 'all') filteredRaw = filteredRaw.filter(r => r.branch === bf);
            if (search) filteredRaw = filteredRaw.filter(r => (r.company_name || '').toLowerCase().includes(search));

            // Build time-series from filtered raw billing
            const weekMap = {};
            filteredRaw.forEach(r => {
                const week = r.weekend_bill || 'Unknown';
                if (!weekMap[week]) weekMap[week] = 0;
                weekMap[week] += Number(r.total_billing) || 0;
            });
            timeSeriesData = Object.entries(weekMap)
                .map(([week, billing]) => ({ week, billing }))
                .sort((a, b) => a.week.localeCompare(b.week));

            let filtered = companyData;
            if (bf !== 'all') filtered = filtered.filter(c => c.branch.includes(bf));
            if (search) filtered = filtered.filter(c => c.company.toLowerCase().includes(search));
            renderTable(filtered);
            renderChart();
        }

        function renderTable(data) {
            const tbody = document.getElementById('dhp-table-body');
            tbody.innerHTML = '';
            let total = 0;
            if (!data.length) { tbody.innerHTML = '<tr><td colspan="4" class="loading-indicator">No DHP data.</td></tr>'; }
            else data.forEach(row => {
                total += row.billing;
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${row.company}</td><td>${row.branch}</td><td style="text-align:right;font-weight:600">${formatCurrency(row.billing)}</td><td style="text-align:right;font-weight:600">${formatNumber(row.hours, 2)}</td>`;
                tbody.appendChild(tr);
            });
            document.getElementById('total-dhp').textContent = `Total DHP Billing: ${formatCurrency(total)}`;
        }

        // ── Linear regression for trendline ───────────────────────
        function linearRegression(data) {
            const n = data.length;
            if (n < 2) return null;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
            data.forEach((y, i) => { sumX += i; sumY += y; sumXY += i * y; sumX2 += i * i; });
            const slope = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            const intercept = (sumY - slope * sumX) / n;
            return data.map((_, i) => slope * i + intercept);
        }

        function renderChart() {
            const ctx = document.getElementById('dhpChart').getContext('2d');
            if (dhpChart) dhpChart.destroy();
            const type = document.getElementById('graph_type').value;

            const labels = timeSeriesData.map(d => d.week);
            const values = timeSeriesData.map(d => d.billing);
            const datasets = [{
                label: 'DHP Billing',
                data: values,
                backgroundColor: 'rgba(124,58,237,0.7)',
                borderColor: 'rgb(124,58,237)',
                borderWidth: 2,
                fill: type === 'line' ? false : undefined,
                tension: 0.3,
            }];

            const trend = linearRegression(values);
            if (trend) {
                datasets.push({
                    label: 'Trend',
                    data: trend,
                    type: 'line',
                    borderColor: 'rgba(239,68,68,0.7)',
                    borderWidth: 2,
                    borderDash: [6, 3],
                    pointRadius: 0,
                    fill: false,
                });
            }

            dhpChart = new Chart(ctx, {
                type: type,
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        x: { ticks: { maxRotation: 45, font: { size: 10 } } },
                        y: { beginAtZero: true, ticks: { callback: v => formatCurrency(v) } },
                    },
                    plugins: { legend: { labels: { font: { size: 11 } } } },
                },
            });
        }

        document.getElementById('apply-btn').addEventListener('click', loadData);
        document.getElementById('start_date').addEventListener('change', loadData);
        document.getElementById('end_date').addEventListener('change', loadData);
        document.getElementById('table_branch_filter').addEventListener('change', processData);
        document.getElementById('company_search').addEventListener('input', processData);
        document.getElementById('graph_type').addEventListener('change', renderChart);
        await loadData();
    </script>
</body>
</html>
